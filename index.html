// ═══════════════════════════════════════════════════════════════════
// UNIFIED STATE OBJECT
// ═══════════════════════════════════════════════════════════════════

let state = {};
let saveTimeout = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? Object.assign({}, DEFAULT_STATE, JSON.parse(raw)) : { ...DEFAULT_STATE };
  } catch (e) {
    state = { ...DEFAULT_STATE };
  }
}

function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if (fbRef) syncToFirebase();
  }, 600);
  setSyncBadge('saving', '\u25cf SAVING');
}

// ═══════════════════════════════════════════════════════════════════
// FIREBASE MODULE
// ═══════════════════════════════════════════════════════════════════

let fbDb = null, fbRef = null, fbReady = false;

function initFirebase() {
  const url = document.getElementById('fbUrl').value.trim();
  const key = document.getElementById('fbKey').value.trim();
  const user = document.getElementById('fbUser').value.trim();
  if (!url || !key) {
    document.getElementById('fbStatus').textContent = '\u26a0 Enter DB URL and API key';
    return;
  }
  try {
    const app = firebase.apps.length
      ? firebase.app()
      : firebase.initializeApp({ apiKey: key, databaseURL: url, projectId: 'horizon-os' });
    fbDb = firebase.database(app);
    fbRef = fbDb.ref('users/' + (user || 'default') + '/state');
    fbRef.once('value', snap => {
      if (snap.val()) { Object.assign(state, snap.val()); }
      fbRef.on('value', s => { if (s.val()) Object.assign(state, s.val()); });
      document.getElementById('fbStatus').innerHTML = '<span style="color:var(--green)">\u2713 Connected</span>';
      setSyncBadge('synced', '\u2601 SYNCED');
      fbReady = true;
    }).catch(e => {
      document.getElementById('fbStatus').innerHTML = '<span style="color:var(--red)">\u2715 ' + e.message + '</span>';
    });
  } catch (e) {
    document.getElementById('fbStatus').innerHTML = '<span style="color:var(--red)">\u2715 ' + e.message + '</span>';
  }
}

function syncToFirebase() {
  if (!fbRef) return;
  fbRef.set(state).then(() => {
    setSyncBadge('synced', '\u2601 SYNCED');
    const el = document.getElementById('sbSyncTime');
    if (el) el.textContent = 'Synced ' + new Date().toLocaleTimeString();
  }).catch(() => setSyncBadge('', 'LOCAL'));
}

function syncFromFirebase() {
  if (!fbRef) return;
  fbRef.once('value', snap => {
    if (snap.val()) {
      Object.assign(state, snap.val());
      saveState();
      setSyncBadge('synced', '\u2601 SYNCED');
    }
  });
}

function setSyncBadge(cls, txt) {
  const b = document.getElementById('syncBadge');
  if (!b) return;
  b.className = 'sync-badge' + (cls ? ' ' + cls : '');
  b.textContent = txt;
}

// ═══════════════════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════════════════

let currentApp = 'money';
let currentPanel = 'dashboard';
let currentPiqView = 'search';

function showApp(app) {
  currentApp = app;
  const moneyEl = document.getElementById('app-money');
  const propEl = document.getElementById('app-property');
  if (moneyEl) moneyEl.style.display = app === 'money' ? '' : 'none';
  if (propEl) propEl.style.display = app === 'property' ? '' : 'none';
  document.querySelectorAll('.app-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.app === app);
  });
  if (app === 'money') {
    location.hash = '#/money/' + currentPanel;
  } else {
    location.hash = '#/property' + (currentPiqView !== 'search' ? '/' + currentPiqView : '');
  }
}

function showPanel(panel) {
  currentPanel = panel;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item,.mob-nav-item').forEach(n => n.classList.remove('active'));
  const pe = document.getElementById('panel-' + panel);
  if (pe) pe.classList.add('active');
  const ni = document.getElementById('nav-' + panel);
  if (ni) ni.classList.add('active');
  const mi = document.getElementById('mn-' + panel);
  if (mi) mi.classList.add('active');
  if (currentApp !== 'money') showApp('money');
  location.hash = '#/money/' + panel;
}

function showPiqPanel(view) {
  currentPiqView = view;
  document.querySelectorAll('.piq-view').forEach(v => v.classList.remove('active'));
  const ve = document.getElementById('piq-' + view);
  if (ve) ve.classList.add('active');
  if (currentApp !== 'property') showApp('property');
  location.hash = '#/property' + (view !== 'search' ? '/' + view : '');
}

function handleRoute() {
  const hash = location.hash || '#/money/dashboard';
  const parts = hash.replace('#/', '').split('/');
  const app = parts[0] || 'money';
  const sub = parts[1] || (app === 'money' ? 'dashboard' : 'search');

  if (app === 'money') {
    currentApp = 'money';
    currentPanel = sub;
    const moneyEl = document.getElementById('app-money');
    const propEl = document.getElementById('app-property');
    if (moneyEl) moneyEl.style.display = '';
    if (propEl) propEl.style.display = 'none';
    document.querySelectorAll('.app-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.app === 'money');
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item,.mob-nav-item').forEach(n => n.classList.remove('active'));
    const pe = document.getElementById('panel-' + sub);
    if (pe) pe.classList.add('active');
    const ni = document.getElementById('nav-' + sub);
    if (ni) ni.classList.add('active');
    const mi = document.getElementById('mn-' + sub);
    if (mi) mi.classList.add('active');
  } else if (app === 'property') {
    currentApp = 'property';
    currentPiqView = sub;
    const moneyEl = document.getElementById('app-money');
    const propEl = document.getElementById('app-property');
    if (moneyEl) moneyEl.style.display = 'none';
    if (propEl) propEl.style.display = '';
    document.querySelectorAll('.app-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.app === 'property');
    });
    document.querySelectorAll('.piq-view').forEach(v => v.classList.remove('active'));
    const ve = document.getElementById('piq-' + sub);
    if (ve) ve.classList.add('active');
  }
}

window.onhashchange = handleRoute;

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  if (location.hash) {
    handleRoute();
  } else {
    location.hash = '#/money/dashboard';
  }
});

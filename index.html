// piqRenderPipeline — developments table with status badges
// ───────────────────────────────────────────────────────────────────
function piqRenderPipeline(r) {
  const a = r.analysis || {};
  const pipe = Array.isArray(a.pipeline) ? a.pipeline : [];

  if (pipe.length === 0) {
    return `
      <div class="piq-section">
        <div class="piq-section-hd">Development Pipeline</div>
        <div class="piq-empty">No pipeline data found for this query.</div>

  function statusClass(s) {
    const t = String(s || '').toLowerCase();
    if (t.includes('complete') || t.includes('klart')) return 'done';
    if (t.includes('construction') || t.includes('byggnation') || t.includes('pågår')) return 'building';
    if (t.includes('approved') || t.includes('beviljat')) return 'approved';
    if (t.includes('planning') || t.includes('ansökt')) return 'planning';
    return 'neutral';
  }

  const rows = pipe.map(p => `

      <td><b>${piqEscape(p.name || '\u2014')}</b></td>
      <td>${piqEscape(p.developer || '\u2014')}</td>
      <td>${p.units != null ? piqEscape(p.units) : '\u2014'}</td>

      <td>${piqEscape(p.completion || '\u2014')}</td>
      <td>${piqEscape(p.priceFrom || '\u2014')}</td>
    </tr>
  `).join('');

  return `
    <div class="piq-section">
      <div class="piq-section-hd">Development Pipeline</div>
      <div class="piq-table-wrap">
        <table class="dt piq-pipeline-table">
          <thead>
            <tr>
              <th>Project</th>
              <th>Developer</th>
              <th>Units</th>
              <th>Status</th>
              <th>Completion</th>
              <th>Price from</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ───────────────────────────────────────────────────────────────────
// piqRenderLegal — legal flag cards + long-form note
// ───────────────────────────────────────────────────────────────────
function piqRenderLegal(r) {
  const cfg = MARKETS[r.market] || {};
  const legal = r.legal || { overall: 'warn', flags: [], summary: '' };
  const a = r.analysis || {};

  // Merge analysis.titleRisks (from Step 2) and legal.flags (from Step 4)
  const apiFlags = Array.isArray(legal.flags) ? legal.flags : [];
  const titleRisks = Array.isArray(a.titleRisks) ? a.titleRisks : [];

  // Build a map keyed by label so we don't double-render
  const merged = {};
  (cfg.legalFlags || []).forEach(f => {
    merged[f.key] = {
      key: f.key,
      label: f.label,
      required: f.required,
      level: 'ok',
      detail: f.required ? 'Required for this market.' : 'Optional but recommended.'
    };
  });
  apiFlags.forEach(f => {
    const key = f.key || f.label || '';
    merged[key] = {
      key,
      label: f.label || f.key || '\u2014',
      required: merged[key] ? merged[key].required : false,
      level: (f.level || 'warn').toLowerCase(),
      detail: f.detail || ''
    };
  });
  titleRisks.forEach(t => {
    const key = (t.title || '').toLowerCase().replace(/\s+/g, '-') || ('risk-' + Math.random());
    merged[key] = {
      key,
      label: t.title || 'Risk',
      required: false,
      level: (t.level || 'warn').toLowerCase(),
      detail: t.detail || ''
    };
  });

  const flagCards = Object.values(merged).map(f => {
    const level = ['ok', 'warn', 'danger'].includes(f.level) ? f.level : 'warn';
    const icon = level === 'ok' ? '\u2713' : level === 'warn' ? '\u26a0' : '\u2715';
    return `
      <div class="legal-card ${level}">
        <div class="legal-card-hd">
          <span class="legal-icon">${icon}</span>
          <div class="legal-label">${piqEscape(f.label)}</div>
          ${f.required ? '<span class="legal-req">REQ</span>' : ''}
        </div>
        <div class="legal-detail">${piqEscape(f.detail)}</div>
      </div>
    `;
  }).join('');

  const overall = (legal.overall || 'warn').toLowerCase();
  const overallLabel = overall === 'ok' ? 'CLEAR' : overall === 'danger' ? 'HIGH RISK' : 'REVIEW REQUIRED';

  return `
    <div class="piq-legal">
      <div class="legal-overall ${overall}">
        <div class="legal-overall-lbl">Overall Legal Status</div>
        <div class="legal-overall-val">${overallLabel}</div>
        ${legal.summary ? `<div class="legal-overall-sum">${piqEscape(legal.summary)}</div>` : ''}
      </div>

      <div class="piq-section">
        <div class="piq-section-hd">${cfg.flag || ''} ${cfg.name || ''} Legal Flags</div>
        <div class="legal-grid">${flagCards}</div>
      </div>

      <div class="piq-section">
        <div class="piq-section-hd">Legal Note</div>
        <div class="legal-note">${piqEscape(cfg.legalNote || 'No legal guidance available for this market.')}</div>
      </div>

      <div class="piq-section">
        <div class="piq-section-hd">Property Terms</div>
        <div class="legal-terms">
          <div><b>Freehold:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.freehold) || '\u2014')}</div>
          <div><b>Leasehold:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.leasehold) || '\u2014')}</div>
          <div><b>Search:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.search) || '\u2014')}</div>
          <div><b>Advocate:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.advocate) || '\u2014')}</div>
          <div><b>Stamp duty:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.stampDuty) || '\u2014')}</div>
          <div><b>Land rates:</b> ${piqEscape((cfg.propertyTerms && cfg.propertyTerms.landRates) || '\u2014')}</div>
        </div>
      </div>
    </div>
  `;
}

function piqRenderCurrency(r) {

    ? ['USD', 'EUR', 'GBP', 'SEK', 'ZAR', 'UGX']

  const rowHtml = pairs.map(cur => {

    return `

              ${pairs.map((c, i) =>
                `<option value="${c}" ${i === 0 ? 'selected' : ''}>${c} (${CSYM[c] || ''})</option>`
              ).join('')}

        <div class="piq-section-hd">Market Rates (1 ${base} =)</div>
        <div class="piq-table-wrap">
          <table class="dt fx-table">
            <tbody>${rowHtml}</tbody>
          </table>
        </div>

          Rates sourced from your Settings panel. Update them under Money OS \u2192 Settings.

function piqFxConvert() {
  if (!piqCurrentResult) return;
  const cfg = MARKETS[piqCurrentResult.market] || {};
  const base = cfg.currency || 'SEK';
  const amountEl = document.getElementById('fx-amount');
  const targetEl = document.getElementById('fx-target');
  const outEl    = document.getElementById('fx-result');
  if (!amountEl || !targetEl || !outEl) return;
  const amt = Number(amountEl.value) || 0;
  const target = targetEl.value;
  const fxRates = state.exchangeRates || {};
  const baseRate = fxRates[base] || 1;
  const curRate = fxRates[target] || 0;
  if (!curRate) { outEl.textContent = '\u2014'; return; }
  const result = amt * (baseRate / curRate);
  outEl.textContent = (CSYM[target] || '') + ' ' +
    Math.round(result).toLocaleString('en-US') + ' ' + target;
}

function piqShareText(r) {
  r = r || piqCurrentResult;
  if (!r) return '';
  const cfg = MARKETS[r.market] || {};
  const a = r.analysis || {};
  return [
    `${cfg.flag || ''} PropIQ — ${r.query} (${cfg.name || ''})`,
    `Verdict: ${r.verdict || '\u2014'} (${r.score || 0}/100)`,
    a.priceRange ? `Price: ${a.priceRange}` : '',
    a.rentalYield ? `Yield: ${a.rentalYield}` : '',
    a.summary ? '\n' + a.summary : '',
    r.verdictReason ? '\n' + r.verdictReason : ''
  ].filter(Boolean).join('\n');
}

function piqShareCopy() {
  const text = piqShareText();
  if (!text) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      const el = document.getElementById('fb-status');
      if (el) { el.textContent = 'Copied'; setTimeout(() => el.textContent = '', 1500); }
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
}

function piqShareWhatsapp() {
  const text = piqShareText();
  if (!text) return;
  const url = 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

function piqShareExport() {
  if (!piqCurrentResult) return;
  const blob = new Blob([JSON.stringify(piqCurrentResult, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safeQ = (piqCurrentResult.query || 'result').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  a.download = 'propiq-' + safeQ + '-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function piqFeedback(val) {
  if (!piqCurrentResult) return;
  piqCurrentResult.feedback = val;
  // Persist into history entry
  if (state.propiq && Array.isArray(state.propiq.history)) {
    const idx = state.propiq.history.findIndex(h => h.id === piqCurrentResult.id);
    if (idx >= 0) state.propiq.history[idx].feedback = val;
  }
  saveState();
  document.querySelectorAll('.fb-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.fb === val);
  });
  const el = document.getElementById('fb-status');
  if (el) {
    el.textContent = val === 'up' ? 'Thanks \u2014 feedback saved' : 'Noted \u2014 we\u2019ll improve';
    setTimeout(() => el.textContent = '', 2500);
  }
}

      <div class="history-item ${active}" onclick="piqLoadFromHistory('${h.id}')">
        <div class="hist-row">
          <span class="hist-flag">${cfg.flag || ''}</span>
          <span class="hist-query">${piqEscape(h.query)}</span>
          <span class="hist-verdict-badge ${verdictCls}">${verdict || '\u2014'}</span>
        </div>
        <div class="hist-meta">
          <span class="hist-market">${piqEscape(cfg.name || h.market)}</span>
          <span class="hist-date">${dateStr}</span>
          ${h.score != null ? `<span class="hist-score">${h.score}/100</span>` : ''}
        </div>
        <button class="hist-del" onclick="event.stopPropagation();piqDeleteFromHistory('${h.id}')" title="Delete">\u2715</button>
      </div>
    `;
  }).join('');
}

function piqLoadFromHistory(id) {
  ensurePropiqState();
  const entry = (state.propiq.history || []).find(h => h.id === id);
  if (!entry) return;
  piqRenderResults(entry);
  piqRenderHistory(); // refresh active state
}

function piqDeleteFromHistory(id) {
  ensurePropiqState();
  state.propiq.history = (state.propiq.history || []).filter(h => h.id !== id);
  // If we deleted the currently-shown result, clear the view
  if (piqCurrentResult && piqCurrentResult.id === id) {
    piqCurrentResult = null;
    const area = document.getElementById('piq-results-area');
    if (area) {
      area.innerHTML = `
        <div class="empty">
          <div class="empty-title">Search a location to begin</div>
          <div class="empty-sub">Live signals \u00b7 Investment analysis \u00b7 Mortgage calculator \u00b7 Legal risk</div>
        </div>
      `;
    }
  }
  saveState();
  piqRenderHistory();
}

function piqClearHistory() {
  if (!confirm('Clear all search history? This cannot be undone.')) return;
  ensurePropiqState();
  state.propiq.history = [];
  piqCurrentResult = null;
  saveState();
  piqRenderHistory();
  const area = document.getElementById('piq-results-area');
  if (area) {
    area.innerHTML = `
      <div class="empty">
        <div class="empty-title">Search a location to begin</div>
        <div class="empty-sub">Live signals \u00b7 Investment analysis \u00b7 Mortgage calculator \u00b7 Legal risk</div>
      </div>
    `;
  }
}

// ───────────────────────────────────────────────────────────────────
// piqCompare — side-by-side grid of recent searches
// ───────────────────────────────────────────────────────────────────
function piqCompare(n) {
  ensurePropiqState();
  const count = Math.min(n || 4, 6);
  const list = (state.propiq.history || []).slice(0, count);
  const area = document.getElementById('piq-results-area');
  if (!area) return;

  if (list.length < 2) {
    area.innerHTML = `
      <div class="empty">
        <div class="empty-title">Not enough searches to compare</div>
        <div class="empty-sub">Run at least 2 searches to see a side-by-side view.</div>
      </div>
    `;
    return;
  }

  const cfgFirst = MARKETS[list[0].market] || {};

  // Build columns
  const cols = list.map(r => {
    const cfg = MARKETS[r.market] || {};
    const a = r.analysis || {};
    const k = a.kpis || {};
    const verdict = (r.verdict || '').toUpperCase();
    const verdictCls = verdict === 'BUY' ? 'buy'
      : verdict === 'HOLD' ? 'hold'
      : verdict === 'AVOID' ? 'avoid' : 'neutral';
    return {
      r, cfg, a, k, verdict, verdictCls
    };
  });

  // Rows of compared attributes
  const rows = [
    { label: 'Market',        pick: c => `${c.cfg.flag || ''} ${c.cfg.name || ''}` },
    { label: 'Verdict',       pick: c => `<span class="cmp-verdict ${c.verdictCls}">${c.verdict || '\u2014'}</span>` },
    { label: 'Score',         pick: c => `${c.r.score || 0}/100` },
    { label: 'Price Range',   pick: c => piqEscape(c.a.priceRange || '\u2014') },
    { label: 'Price per m\u00b2',pick: c => piqEscape(c.a.pricePerSqm || '\u2014') },
    { label: 'Rental Yield',  pick: c => piqEscape(c.k.yield || c.a.rentalYield || '\u2014') },
    { label: 'Appreciation',  pick: c => piqEscape(c.k.appreciation || c.a.capitalAppreciation || '\u2014') },
    { label: 'Avg Price',     pick: c => piqEscape(c.k.avgPrice || '\u2014') },
    { label: 'Liquidity',     pick: c => piqEscape(c.k.liquidity || '\u2014') },
    { label: 'Summary',       pick: c => piqEscape((c.a.summary || '').slice(0, 160) + ((c.a.summary || '').length > 160 ? '\u2026' : '')) }
  ];

  const headerCells = cols.map(c => `
    <th class="cmp-col-head">
      <div class="cmp-col-flag">${c.cfg.flag || ''}</div>
      <div class="cmp-col-query">${piqEscape(c.r.query)}</div>
      <div class="cmp-col-date">${new Date(c.r.timestamp).toLocaleDateString()}</div>
      <button class="cmp-open" onclick="piqLoadFromHistory('${c.r.id}')">Open \u2192</button>
    </th>
  `).join('');

  const bodyRows = rows.map(row => `
    <tr>
      <th class="cmp-row-label">${row.label}</th>
      ${cols.map(c => `<td>${row.pick(c)}</td>`).join('')}
    </tr>
  `).join('');

  area.innerHTML = `
    <div class="piq-compare">
      <div class="piq-compare-hd">
        <div>
          <div class="piq-section-hd">Property Comparison</div>
          <div class="piq-muted">Your last ${list.length} searches \u00b7 ${cfgFirst.flag || ''} ${cfgFirst.name || ''} focus</div>
        </div>
        <button class="btn-secondary" onclick="piqBackToResults()">\u2190 Back</button>
      </div>
      <div class="piq-compare-wrap">
        <table class="dt cmp-table">
          <thead>
            <tr>
              <th class="cmp-row-label"></th>
              ${headerCells}
            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function piqBackToResults() {
  if (piqCurrentResult) {
    piqRenderResults(piqCurrentResult);
  } else {
    ensurePropiqState();
    const last = (state.propiq.history || [])[0];
    if (last) {
      piqRenderResults(last);
    } else {
      const area = document.getElementById('piq-results-area');
      if (area) {
        area.innerHTML = `
          <div class="empty">
            <div class="empty-title">Search a location to begin</div>
            <div class="empty-sub">Live signals \u00b7 Investment analysis \u00b7 Mortgage calculator \u00b7 Legal risk</div>
          </div>
        `;
      }
    }
  }
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// THEME TOGGLE (Part 5E-2)
// ═══════════════════════════════════════════════════════════════════

function ensureDisplayState() {
  if (!state.display || typeof state.display !== 'object') {
    state.display = {
      theme: state.darkMode === false ? 'light' : 'dark'
    };
  }
  if (state.display.theme !== 'light' && state.display.theme !== 'dark') {
    state.display.theme = 'dark';
  }
}

function setTheme(theme) {
  // Normalize
  if (theme !== 'light' && theme !== 'dark') theme = 'dark';

  ensureDisplayState();
  state.display.theme = theme;
  // Keep legacy darkMode flag in sync so existing panels/settings read right
  state.darkMode = theme === 'dark';

  // Apply to <html>
  document.documentElement.setAttribute('data-theme', theme);

  // Update toggle button icon(s)
  // Convention: any element with .theme-toggle gets its innerHTML updated,
  // and elements with id="theme-toggle-icon" get refreshed too.
  const icon = theme === 'dark' ? '\u263e' : '\u2600\ufe0f';   // ☾ moon / ☀ sun
  const nextLbl = theme === 'dark' ? 'Light mode' : 'Dark mode';

  document.querySelectorAll('.theme-toggle').forEach(btn => {
    btn.setAttribute('aria-label', nextLbl);
    btn.setAttribute('title', nextLbl);
    const iconEl = btn.querySelector('.theme-toggle-icon');
    if (iconEl) {
      iconEl.textContent = icon;
    } else {
      btn.textContent = icon;
    }
  });

  const topIcon = document.getElementById('theme-toggle-icon');
  if (topIcon) topIcon.textContent = icon;

  saveState();
}

function toggleTheme() {
  ensureDisplayState();
  setTheme(state.display.theme === 'dark' ? 'light' : 'dark');
}

// Apply saved theme on load
(function applySavedTheme() {
  function apply() {
    ensureDisplayState();
    setTheme(state.display.theme);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', apply);
  } else {
    apply();
  }
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// API KEY MODAL (Part 5E-3)
// ═══════════════════════════════════════════════════════════════════

function openKeyModal() {
  const modal = document.getElementById('key-modal');
  if (!modal) return;

  // Prefill inputs from localStorage (under both the spec keys and
  // the legacy propiq_* keys used by the search engine)
  const ak = localStorage.getItem('anthropic-key')  || localStorage.getItem('propiq_ak') || '';
  const pk = localStorage.getItem('perplexity-key') || localStorage.getItem('propiq_pk') || '';

  const akInput = document.getElementById('key-anthropic');
  const pkInput = document.getElementById('key-perplexity');
  if (akInput) akInput.value = ak;
  if (pkInput) pkInput.value = pk;

  // Clear any previous error state
  const err = document.getElementById('key-modal-error');
  if (err) err.textContent = '';

  modal.classList.add('open');
  modal.style.display = 'flex';

  // Focus first empty field
  setTimeout(() => {
    if (akInput && !akInput.value) akInput.focus();
    else if (pkInput && !pkInput.value) pkInput.focus();
    else if (akInput) akInput.focus();
  }, 50);
}

function closeKeyModal() {
  const modal = document.getElementById('key-modal');
  if (!modal) return;
  modal.classList.remove('open');
  modal.style.display = 'none';
}

function saveKeys() {
  const akInput = document.getElementById('key-anthropic');
  const pkInput = document.getElementById('key-perplexity');
  const err = document.getElementById('key-modal-error');

  const ak = (akInput && akInput.value || '').trim();
  const pk = (pkInput && pkInput.value || '').trim();

  // Validate: Anthropic key is required (non-empty)
  if (!ak) {
    if (err) err.textContent = 'Anthropic API key is required.';
    if (akInput) akInput.focus();
    updateKeyBadge();
    return;
  }

  // Persist under the spec key names …
  localStorage.setItem('anthropic-key', ak);
  if (pk) localStorage.setItem('perplexity-key', pk);
  else localStorage.removeItem('perplexity-key');

  // … and mirror to the legacy keys used by piqSearch() so the
  // PropIQ engine picks them up without a reload.
  localStorage.setItem('propiq_ak', ak);
  if (pk) localStorage.setItem('propiq_pk', pk);
  else localStorage.removeItem('propiq_pk');

  if (err) err.textContent = '';
  updateKeyBadge();
  closeKeyModal();
}

function updateKeyBadge() {
  const ak = localStorage.getItem('anthropic-key') || localStorage.getItem('propiq_ak') || '';
  const pk = localStorage.getItem('perplexity-key') || localStorage.getItem('propiq_pk') || '';
  const hasAnthropic = !!ak;
  const hasPerplexity = !!pk;

  // Overall badge — green only when the required key is set
  const badge = document.getElementById('key-badge');
  if (badge) {
    badge.classList.remove('set', 'missing', 'partial');
    if (hasAnthropic && hasPerplexity) {
      badge.classList.add('set');
      badge.style.color = 'var(--green)';
      badge.style.borderColor = 'var(--green)';
      badge.textContent = '\u25cf KEYS SET';
    } else if (hasAnthropic) {
      badge.classList.add('partial');
      badge.style.color = 'var(--green)';
      badge.style.borderColor = 'var(--green)';
      badge.textContent = '\u25cf ANTHROPIC SET';
    } else {
      badge.classList.add('missing');
      badge.style.color = 'var(--amber)';
      badge.style.borderColor = 'var(--amber)';
      badge.textContent = '\u25cf KEY MISSING';
    }
  }

  // Per-key pill indicators (optional elements)
  const akPill = document.getElementById('key-badge-anthropic');
  if (akPill) {
    akPill.classList.toggle('set', hasAnthropic);
    akPill.classList.toggle('missing', !hasAnthropic);
    akPill.style.color = hasAnthropic ? 'var(--green)' : 'var(--amber)';
  }
  const pkPill = document.getElementById('key-badge-perplexity');
  if (pkPill) {
    pkPill.classList.toggle('set', hasPerplexity);
    pkPill.classList.toggle('missing', !hasPerplexity);
    pkPill.style.color = hasPerplexity ? 'var(--green)' : 'var(--amber)';
  }
}

// Initial badge sync on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', updateKeyBadge);
} else {
  updateKeyBadge();
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// CLAUDE API CLIENT (Part 5E-4)
// ═══════════════════════════════════════════════════════════════════

async function claudeFetch(systemPrompt, userMessage) {
  // Pull the stored Anthropic key — try the spec key name first,
  // then fall back to the legacy name used by the PropIQ engine.
  const key = localStorage.getItem('anthropic-key')
    || localStorage.getItem('propiq_ak')
    || '';

  if (!key) {
    return 'Anthropic API key missing. Open the key modal and paste a key starting with sk-ant- to continue.';
  }
  if (!key.startsWith('sk-ant-')) {
    return 'Anthropic API key looks invalid (should start with sk-ant-). Please re-enter it via the key modal.';
  }

  const body = {
    model: 'claude-sonnet-4-5',
    max_tokens: 2000,
    messages: [
      { role: 'user', content: String(userMessage == null ? '' : userMessage) }
    ]
  };
  if (systemPrompt) {
    body.system = String(systemPrompt);
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      let detail = '';
      try {
        const err = await res.json();
        detail = (err && err.error && err.error.message) || '';
      } catch (e) {
        try { detail = await res.text(); } catch (_) {}
      }
      return 'Claude request failed (' + res.status + ')'
        + (detail ? ': ' + detail : '') + '.';
    }

    const data = await res.json();
    // Expected shape: { content: [{ type: 'text', text: '...' }, ...], ... }
    if (data && Array.isArray(data.content)) {
      const text = data.content
        .filter(b => b && b.type === 'text' && typeof b.text === 'string')
        .map(b => b.text)
        .join('\n')
        .trim();
      if (text) return text;
    }
    return 'Claude returned an empty response. Please try again.';
  } catch (e) {
    const msg = (e && e.message) ? e.message : String(e);
    if (/NetworkError|Failed to fetch|CORS/i.test(msg)) {
      return 'Network or CORS error reaching api.anthropic.com. If you are running from a local file, host the page on Netlify or a local server so the browser can call the API.';
    }
    return 'Claude request error: ' + msg;
  }
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// AI FAB CHAT PANEL (Part 5E-5)
// ═══════════════════════════════════════════════════════════════════

let chatHistory = [];       // [{ role: 'user'|'assistant', text: '...' }]
let chatBusy = false;

function openChat() {
  const panel = document.getElementById('chat-panel');
  if (!panel) return;
  panel.classList.add('open');
  panel.style.display = 'flex';
  // Focus input
  setTimeout(() => {
    const input = document.getElementById('chat-input');
    if (input) input.focus();
  }, 60);
  // Seed welcome bubble on first open
  const msgs = document.getElementById('chat-messages');
  if (msgs && !msgs.childElementCount) {
    const ctx = (typeof currentApp !== 'undefined' && currentApp === 'property')
      ? 'Hi! I\u2019m your PropIQ property analyst. Ask me about any location, comparable deals, legal risks, or mortgage options.'
      : 'Hi! I\u2019m your Money OS financial assistant. Ask me anything about your cashflow, nest egg, retirement plan, or fun fund.';
    appendChatBubble('assistant', ctx);
  }
}

function closeChat() {
  const panel = document.getElementById('chat-panel');
  if (!panel) return;
  panel.classList.remove('open');
  panel.style.display = 'none';
}

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  if (!panel) return;
  if (panel.classList.contains('open')) closeChat();
  else openChat();
}

function appendChatBubble(role, text) {
  const msgs = document.getElementById('chat-messages');
  if (!msgs) return null;
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + (role === 'user' ? 'user' : 'assistant');
  // Render markdown for assistant, plaintext (escaped) for user
  if (role === 'assistant' && typeof renderMarkdown === 'function') {
    div.innerHTML = renderMarkdown(text);
  } else {
    // Fallback escape — mirrors piqEscape to avoid injection from user input
    const esc = String(text == null ? '' : text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
      .replace(/\n/g, '<br>');
    div.innerHTML = esc;
  }
  msgs.appendChild(div);
  chatScrollBottom();
  return div;
}

function chatScrollBottom() {
  const msgs = document.getElementById('chat-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// ── Context-aware system prompt ────────────────────────────────────
function buildChatSystemPrompt() {
  const app = (typeof currentApp !== 'undefined') ? currentApp : 'money';

  if (app === 'property') {
    ensurePropiqState();
    const market = state.propiq && state.propiq.market ? state.propiq.market : 'ke';
    const cfg = MARKETS[market] || {};
    const last = piqCurrentResult;
    const ctxParts = [
      'You are PropIQ, an AI property investment analyst embedded in the Horizon app.',
      `Active market: ${cfg.flag || ''} ${cfg.name || market} (currency ${cfg.currency || ''}).`,
      'Be concise, cite ranges in the local currency, and focus on rental yield, capital appreciation, legal risk, and mortgage math when relevant.'
    ];
    if (last) {
      const a = last.analysis || {};
      ctxParts.push(
        `The user is currently viewing the analysis for "${last.query}" with verdict ${last.verdict || '—'} (score ${last.score || 0}/100). `
        + `Price range: ${a.priceRange || '—'}. Yield: ${a.rentalYield || '—'}. Summary: ${a.summary || '—'}`
      );
    }
    ctxParts.push('Format answers in short Markdown (headings, bullets, bold). Never invent API data — only reason from what is stated.');
    return ctxParts.join('\n\n');
  }

  // Money OS context — pull live calc values
  try {
    const inc = calcIncome();
    const exp = calcExpenses();
    const sav = calcSavings();
    const nw  = calcNetWorth();
    const egg = calcNestEgg();
    const ret = calcRetirement();
    const ff  = calcFunFund();
    const cur = state.currency || 'SEK';

    return [
      'You are the Money OS financial assistant inside the Horizon app — a personal CFO for the user.',
      'Answer questions about cashflow, net worth, nest egg, retirement plan, and the fun fund.',
      `Base currency: ${cur}. The user is ${state.currentAge} years old, targeting retirement at ${state.retirementAge} (life expectancy ${state.lifeExp}).`,
      'Live snapshot (all figures in base currency):',
      `- Monthly income: ${Math.round(inc.total)}`,
      `- Monthly expenses: ${Math.round(exp.total)} (${exp.paid.length}/${exp.items.length} paid)`,
      `- Monthly surplus: ${Math.round(sav.surplus)}`,
      `- Base savings: ${Math.round(sav.baseSavings)} (${sav.savingsRate.toFixed(1)}% of income)`,
      `- Fun fund balance: ${Math.round(ff.balance)}`,
      `- Net worth: ${Math.round(nw.netWorth)} (assets ${Math.round(nw.assets.total)}, liabilities ${Math.round(nw.liabilities.total)})`,
      `- Nest egg projection at retirement: ${Math.round(ret.nestEggAtRetirement)} (nominal)`,
      `- Pension monthly: ${Math.round(ret.pension.monthlyTotal)}; drawdown after tax: ${Math.round(ret.monthlyDrawdownAfterTax)}; total retirement income: ${Math.round(ret.monthlyRetirementIncome)}`,
      `- Retirement gap vs current expenses: ${Math.round(ret.gap)} (${ret.onTrack ? 'ON TRACK' : 'SHORTFALL'})`,
      `- FIRE number: ${Math.round(ret.fireNumber)}`,
      'Use short Markdown (bold, bullets, inline code for numbers when helpful). Never fabricate numbers beyond the snapshot — if the user asks something you cannot compute from it, say so and suggest what to enter in the app.'
    ].join('\n');
  } catch (e) {
    return 'You are the Money OS financial assistant inside the Horizon app. Help the user think about cashflow, savings, net worth, retirement, and the fun fund. Keep answers concise, use Markdown.';
  }
}

// ── Send handler ──────────────────────────────────────────────────
async function sendChat() {
  if (chatBusy) return;
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = (input.value || '').trim();
  if (!text) return;

  // Append user bubble + clear input
  appendChatBubble('user', text);
  chatHistory.push({ role: 'user', text });
  input.value = '';
  input.focus();

  // Show a pending assistant bubble
  const pending = appendChatBubble('assistant', '\u2026');
  if (pending) pending.classList.add('pending');

  chatBusy = true;
  try {
    // Build context-aware prompt
    const system = buildChatSystemPrompt();

    // Include recent prior exchanges (last 6 turns) as rolling context
    const recent = chatHistory.slice(-7, -1) // exclude the just-pushed user turn
      .map(t => (t.role === 'user' ? 'User' : 'Assistant') + ': ' + t.text)
      .join('\n\n');
    const userMsg = recent
      ? `Previous exchange:\n${recent}\n\nNew user message: ${text}`
      : text;

    const reply = await claudeFetch(system, userMsg);

    // Replace pending bubble content
    if (pending) {
      pending.classList.remove('pending');
      if (typeof renderMarkdown === 'function') {
        pending.innerHTML = renderMarkdown(reply);
      } else {
        pending.textContent = reply;
      }
    } else {
      appendChatBubble('assistant', reply);
    }
    chatHistory.push({ role: 'assistant', text: reply });
  } catch (e) {
    const errMsg = 'Sorry — chat error: ' + ((e && e.message) || e);
    if (pending) {
      pending.classList.remove('pending');
      pending.textContent = errMsg;
    } else {
      appendChatBubble('assistant', errMsg);
    }
  } finally {
    chatBusy = false;
    chatScrollBottom();
  }
}

// Enter-to-send wiring (attached on first open via openChat focus)
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || e.shiftKey) return;
  const active = document.activeElement;
  if (active && active.id === 'chat-input') {
    e.preventDefault();
    sendChat();
  }
});
</script>

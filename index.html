// ═══════════════════════════════════════════════════════════════════
// UNIFIED STATE OBJECT
// ═══════════════════════════════════════════════════════════════════

let state = {};
let saveTimeout = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? Object.assign({}, DEFAULT_STATE, JSON.parse(raw)) : { ...DEFAULT_STATE };
  } catch (e) {
    state = { ...DEFAULT_STATE };
  }
}

function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if (fbRef) syncToFirebase();
  }, 600);
  setSyncBadge('saving', '\u25cf SAVING');
}

// ═══════════════════════════════════════════════════════════════════
// FIREBASE MODULE
// ═══════════════════════════════════════════════════════════════════

let fbDb = null, fbRef = null, fbReady = false;

function initFirebase() {
  const url = document.getElementById('fbUrl').value.trim();
  const key = document.getElementById('fbKey').value.trim();
  const user = document.getElementById('fbUser').value.trim();
  if (!url || !key) {
    document.getElementById('fbStatus').textContent = '\u26a0 Enter DB URL and API key';
    return;
  }
  try {
    const app = firebase.apps.length
      ? firebase.app()
      : firebase.initializeApp({ apiKey: key, databaseURL: url, projectId: 'horizon-os' });
    fbDb = firebase.database(app);
    fbRef = fbDb.ref('users/' + (user || 'default') + '/state');
    fbRef.once('value', snap => {
      if (snap.val()) { Object.assign(state, snap.val()); }
      fbRef.on('value', s => { if (s.val()) Object.assign(state, s.val()); });
      document.getElementById('fbStatus').innerHTML = '<span style="color:var(--green)">\u2713 Connected</span>';
      setSyncBadge('synced', '\u2601 SYNCED');
      fbReady = true;
    }).catch(e => {
      document.getElementById('fbStatus').innerHTML = '<span style="color:var(--red)">\u2715 ' + e.message + '</span>';
    });
  } catch (e) {
    document.getElementById('fbStatus').innerHTML = '<span style="color:var(--red)">\u2715 ' + e.message + '</span>';
  }
}

function syncToFirebase() {
  if (!fbRef) return;
  fbRef.set(state).then(() => {
    setSyncBadge('synced', '\u2601 SYNCED');
    const el = document.getElementById('sbSyncTime');
    if (el) el.textContent = 'Synced ' + new Date().toLocaleTimeString();
  }).catch(() => setSyncBadge('', 'LOCAL'));
}

function syncFromFirebase() {
  if (!fbRef) return;
  fbRef.once('value', snap => {
    if (snap.val()) {
      Object.assign(state, snap.val());
      saveState();
      setSyncBadge('synced', '\u2601 SYNCED');
    }
  });
}

function setSyncBadge(cls, txt) {
  const b = document.getElementById('syncBadge');
  if (!b) return;
  b.className = 'sync-badge' + (cls ? ' ' + cls : '');
  b.textContent = txt;
}

// ═══════════════════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════════════════

let currentApp = 'money';
let currentPanel = 'dashboard';
let currentPiqView = 'search';

function showApp(app) {
  currentApp = app;
  const moneyEl = document.getElementById('app-money');
  const propEl = document.getElementById('app-property');
  if (moneyEl) moneyEl.style.display = app === 'money' ? '' : 'none';
  if (propEl) propEl.style.display = app === 'property' ? '' : 'none';
  document.querySelectorAll('.app-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.app === app);
  });
  if (app === 'money') {
    location.hash = '#/money/' + currentPanel;
  } else {
    location.hash = '#/property' + (currentPiqView !== 'search' ? '/' + currentPiqView : '');
  }
}

function showPanel(panel) {
  currentPanel = panel;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item,.mob-nav-item').forEach(n => n.classList.remove('active'));
  const pe = document.getElementById('panel-' + panel);
  if (pe) pe.classList.add('active');
  const ni = document.getElementById('nav-' + panel);
  if (ni) ni.classList.add('active');
  const mi = document.getElementById('mn-' + panel);
  if (mi) mi.classList.add('active');
  if (currentApp !== 'money') showApp('money');
  location.hash = '#/money/' + panel;
}

function showPiqPanel(view) {
  currentPiqView = view;
  document.querySelectorAll('.piq-view').forEach(v => v.classList.remove('active'));
  const ve = document.getElementById('piq-' + view);
  if (ve) ve.classList.add('active');
  if (currentApp !== 'property') showApp('property');
  location.hash = '#/property' + (view !== 'search' ? '/' + view : '');
}

function handleRoute() {
  const hash = location.hash || '#/money/dashboard';
  const parts = hash.replace('#/', '').split('/');
  const app = parts[0] || 'money';
  const sub = parts[1] || (app === 'money' ? 'dashboard' : 'search');

  if (app === 'money') {
    currentApp = 'money';
    currentPanel = sub;
    const moneyEl = document.getElementById('app-money');
    const propEl = document.getElementById('app-property');
    if (moneyEl) moneyEl.style.display = '';
    if (propEl) propEl.style.display = 'none';
    document.querySelectorAll('.app-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.app === 'money');
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item,.mob-nav-item').forEach(n => n.classList.remove('active'));
    const pe = document.getElementById('panel-' + sub);
    if (pe) pe.classList.add('active');
    const ni = document.getElementById('nav-' + sub);
    if (ni) ni.classList.add('active');
    const mi = document.getElementById('mn-' + sub);
    if (mi) mi.classList.add('active');
  } else if (app === 'property') {
    currentApp = 'property';
    currentPiqView = sub;
    const moneyEl = document.getElementById('app-money');
    const propEl = document.getElementById('app-property');
    if (moneyEl) moneyEl.style.display = 'none';
    if (propEl) propEl.style.display = '';
    document.querySelectorAll('.app-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.app === 'property');
    });
    document.querySelectorAll('.piq-view').forEach(v => v.classList.remove('active'));
    const ve = document.getElementById('piq-' + sub);
    if (ve) ve.classList.add('active');
  }
}

window.onhashchange = handleRoute;

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  if (location.hash) {
    handleRoute();
  } else {
    location.hash = '#/money/dashboard';
  }
});
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// MONEY OS — CALCULATION ENGINE (pure math, no DOM access)
// ═══════════════════════════════════════════════════════════════════

function calcIncome(monthKey) {
  const key = monthKey || state.selectedMonth;
  const ov = state.monthlyOverrides[key];
  const items = ov && ov.income ? ov.income : state.income;
  const total = items.reduce((s, i) => s + i.amount, 0);
  return { items, total, month: key, hasOverride: !!(ov && ov.income) };
}

function calcExpenses(monthKey) {
  const key = monthKey || state.selectedMonth;
  const ov = state.monthlyOverrides[key];
  const items = ov && ov.expenses ? ov.expenses : state.expenses;
  const total = items.reduce((s, i) => s + i.amount, 0);
  const paid = items.filter(i => i.paid);
  const unpaid = items.filter(i => !i.paid);
  const paidTotal = paid.reduce((s, i) => s + i.amount, 0);
  const unpaidTotal = unpaid.reduce((s, i) => s + i.amount, 0);
  return { items, total, paid, unpaid, paidTotal, unpaidTotal, month: key, hasOverride: !!(ov && ov.expenses) };
}

function calcSavings(monthKey) {
  const key = monthKey || state.selectedMonth;
  const ov = state.monthlyOverrides[key];
  const inc = calcIncome(key);
  const exp = calcExpenses(key);
  const baseSav = ov && ov.savings !== undefined ? ov.savings : state.baseSavings;
  const surplus = inc.total - exp.total;
  const savingsRate = inc.total > 0 ? (baseSav / inc.total) * 100 : 0;
  const funFund = Math.max(0, surplus - baseSav);

  // Split: 50% emergency, 30% nest egg, 20% fun fund (of base savings)
  const emergency = baseSav * 0.5;
  const nestEggAlloc = baseSav * 0.3;
  const funAlloc = baseSav * 0.2;

  return {
    baseSavings: baseSav,
    surplus,
    savingsRate: Math.round(savingsRate * 10) / 10,
    funFund,
    allocation: { emergency, nestEgg: nestEggAlloc, funFund: funAlloc },
    month: key
  };
}

function calcCashFlow() {
  const now = new Date();
  const months = [];
  let cumSavings = 0;

  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - 11 + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const inc = calcIncome(key);
    const exp = calcExpenses(key);
    const surplus = inc.total - exp.total;
    cumSavings += surplus;
    months.push({
      month: key,
      label: MN[d.getMonth()] + ' ' + d.getFullYear(),
      income: inc.total,
      expenses: exp.total,
      surplus,
      cumSavings
    });
  }

  const avgIncome = months.reduce((s, m) => s + m.income, 0) / 12;
  const avgExpenses = months.reduce((s, m) => s + m.expenses, 0) / 12;
  const avgSurplus = months.reduce((s, m) => s + m.surplus, 0) / 12;

  return { months, avgIncome, avgExpenses, avgSurplus, cumSavings };
}

function calcNetWorth() {
  // Assets: external investment accounts
  const assetItems = (state.externalAssets || []).map(a => ({
    id: a.id,
    name: a.name,
    value: a.balance
  }));
  const totalAssets = assetItems.reduce((s, a) => s + a.value, 0);

  // Property asset
  const propertyValue = state.netWorth.property || 0;

  // Liabilities
  const mortgage = state.netWorth.mortgage || 0;
  const otherDebt = state.netWorth.otherDebt || 0;
  const totalLiabilities = mortgage + otherDebt;

  // Net worth
  const netWorth = totalAssets + propertyValue - totalLiabilities;

  return {
    assets: {
      investments: { items: assetItems, total: totalAssets },
      property: propertyValue,
      total: totalAssets + propertyValue
    },
    liabilities: {
      mortgage,
      otherDebt,
      total: totalLiabilities
    },
    netWorth
  };
}

function calcNestEgg(yearsOverride) {
  const years = yearsOverride !== undefined ? yearsOverride : (state.retirementAge - state.currentAge);
  const inflRate = state.inflationRate / 100;
  const projections = [];

  // Per-asset projections
  const assetProjections = (state.externalAssets || []).map(a => {
    const r = (a.growthRate || state.growthRate) / 100;
    const rn = r / 12;
    const timeline = [];
    let bal = a.balance;
    for (let y = 0; y <= years; y++) {
      const realBal = bal / Math.pow(1 + inflRate, y);
      timeline.push({ year: y, nominal: Math.round(bal), real: Math.round(realBal) });
      if (y < years) {
        for (let m = 0; m < 12; m++) {
          bal = bal * (1 + rn) + a.monthlyContribution;
        }
      }
    }
    return { id: a.id, name: a.name, timeline };
  });

  // Aggregate totals per year
  for (let y = 0; y <= years; y++) {
    let nominal = 0;
    let real = 0;
    assetProjections.forEach(ap => {
      nominal += ap.timeline[y].nominal;
      real += ap.timeline[y].real;
    });
    projections.push({ year: y, nominal, real });
  }

  // Also add monthly savings contribution as a separate growth line
  const savRate = state.growthRate / 100;
  const savRn = savRate / 12;
  let savBal = 0;
  const savingsTimeline = [];
  for (let y = 0; y <= years; y++) {
    const realBal = savBal / Math.pow(1 + inflRate, y);
    savingsTimeline.push({ year: y, nominal: Math.round(savBal), real: Math.round(realBal) });
    if (y < years) {
      for (let m = 0; m < 12; m++) {
        savBal = savBal * (1 + savRn) + state.baseSavings;
      }
    }
  }

  // Grand total = assets + savings contributions
  const grandTotal = projections.map((p, i) => ({
    year: p.year,
    nominal: p.nominal + savingsTimeline[i].nominal,
    real: p.real + savingsTimeline[i].real
  }));

  return {
    years,
    assetProjections,
    savingsTimeline,
    projections,
    grandTotal,
    finalNominal: grandTotal.length ? grandTotal[grandTotal.length - 1].nominal : 0,
    finalReal: grandTotal.length ? grandTotal[grandTotal.length - 1].real : 0
  };
}

function calcRetirement() {
  const yearsToRet = state.retirementAge - state.currentAge;
  const retYears = state.lifeExp - state.retirementAge;

  // Swedish pension components (monthly)
  const penAllman = state.penAllman || 0;
  const penITP = state.penITP || 0;
  const penOther = state.penOther || 0;
  const monthlyPension = penAllman + penITP + penOther;

  // Nest egg at retirement
  const egg = calcNestEgg(yearsToRet);
  const nestEggAtRet = state.nestEggReal ? egg.finalReal : egg.finalNominal;

  // Monthly drawdown from nest egg over retirement years
  const drawdownMonths = retYears * 12;
  const postRetR = state.postRetGrowth / 100 / 12;
  let monthlyDrawdown = 0;
  if (drawdownMonths > 0) {
    if (postRetR > 0) {
      // PMT formula: PMT = PV * r / (1 - (1+r)^-n)
      monthlyDrawdown = nestEggAtRet * postRetR / (1 - Math.pow(1 + postRetR, -drawdownMonths));
    } else {
      monthlyDrawdown = nestEggAtRet / drawdownMonths;
    }
  }

  // After-tax drawdown
  const taxRate = state.withdrawTaxRate / 100;
  const monthlyDrawdownAfterTax = monthlyDrawdown * (1 - taxRate);

  // Total monthly retirement income
  const monthlyRetIncome = monthlyPension + monthlyDrawdownAfterTax;

  // Current monthly expenses as baseline target
  const currentExp = calcExpenses();
  const monthlyTarget = currentExp.total;

  // FIRE number: 25x annual expenses (4% rule)
  const fireNumber = monthlyTarget * 12 * 25;

  // Gap analysis
  const gap = monthlyTarget - monthlyRetIncome;
  const onTrack = gap <= 0;

  return {
    yearsToRetirement: yearsToRet,
    retirementYears: retYears,
    pension: {
      allman: penAllman,
      itp: penITP,
      other: penOther,
      monthlyTotal: monthlyPension
    },
    nestEggAtRetirement: Math.round(nestEggAtRet),
    drawdownMonths,
    monthlyDrawdownGross: Math.round(monthlyDrawdown),
    monthlyDrawdownAfterTax: Math.round(monthlyDrawdownAfterTax),
    monthlyRetirementIncome: Math.round(monthlyRetIncome),
    monthlyTarget,
    fireNumber: Math.round(fireNumber),
    gap: Math.round(gap),
    onTrack
  };
}

function calcFunFund(monthKey) {
  const sav = calcSavings(monthKey);
  const balance = sav.funFund;

  // Affordability tiers
  const tiers = [
    { name: 'Coffee date', amount: 500 },
    { name: 'Nice dinner', amount: 2000 },
    { name: 'Weekend trip', amount: 8000 },
    { name: 'Short holiday', amount: 25000 },
    { name: 'Big vacation', amount: 50000 }
  ];

  const tiersWithStatus = tiers.map(t => {
    const affordable = balance >= t.amount;
    const monthsToReach = !affordable && balance < t.amount && sav.funFund > 0
      ? Math.ceil((t.amount - balance) / sav.funFund)
      : affordable ? 0 : Infinity;
    return { ...t, affordable, monthsToReach };
  });

  // Find the next unreached tier
  const nextTier = tiersWithStatus.find(t => !t.affordable) || null;

  return {
    balance,
    monthlySurplus: sav.funFund,
    tiers: tiersWithStatus,
    nextTier,
    month: sav.month
  };
}
</script>

function renderFunFund() {
  const ff = calcFunFund();

  // Tier grid
  const tierGrid = el('vac-tier-grid');
  if (tierGrid) {
    tierGrid.innerHTML = ff.tiers.map(t =>

  // Fund timeline bars
  const timeline = el('vac-timeline');
  if (timeline) {
    const maxTier = ff.tiers[ff.tiers.length - 1].amount;
    timeline.innerHTML = ff.tiers.map(t => {

    }).join('');

  // Saved trips list
  const tripList = el('vac-trips');
  if (tripList) {
    if (state.savedTrips.length === 0) {
      tripList.innerHTML = '<div class="empty-sub">No saved trips yet. Pick a destination below!</div>';
    } else {
      tripList.innerHTML = state.savedTrips.map((t, idx) =>
        `<div class="trip-card"><div class="trip-dest">${t.flag || ''} ${t.dest}</div><div class="trip-cost">${t.cost || ''}</div><button class="li-remove" onclick="state.savedTrips.splice(${idx},1);saveState();renderFunFund()">✕</button></div>`
      ).join('');
    }
  }

  // Destination pulse grid with filters
  const pulseGrid = el('vac-pulse-grid');
  if (pulseGrid) {
    const filter = pulseGrid.dataset.filter || '';
    const dests = filter ? PULSE_DESTS.filter(d => d.vibe === filter) : PULSE_DESTS;
    const vibes = [...new Set(PULSE_DESTS.map(d => d.vibe))];
    let html = `<div class="pulse-filters"><button class="pfilt${!filter ? ' active' : ''}" onclick="el('vac-pulse-grid').dataset.filter='';renderFunFund()">All</button>`;
    html += vibes.map(v => `<button class="pfilt${filter === v ? ' active' : ''}" onclick="el('vac-pulse-grid').dataset.filter='${v}';renderFunFund()">${v}</button>`).join('');

      `<div class="pulse-card" style="border-left:3px solid ${d.col}">` +

    `<div class="kpi"><div class="kpi-label">Nest Egg at Ret.</div><div class="kpi-value">${fmt(ret.nestEggAtRetirement)}</div></div>` +
    `<div class="kpi"><div class="kpi-label">Monthly Drawdown</div><div class="kpi-value">${fmt(ret.monthlyDrawdownAfterTax)}</div></div>` +
    `<div class="kpi"><div class="kpi-label">Total Ret. Income</div><div class="kpi-value">${fmt(ret.monthlyRetirementIncome)}</div></div>` +
    `<div class="kpi"><div class="kpi-label">FIRE Number</div><div class="kpi-value">${fmt(ret.fireNumber)}</div></div>` +
    `<div class="kpi"><div class="kpi-label">Gap</div><div class="kpi-value ${ret.onTrack ? 'positive' : 'negative'}">${ret.onTrack ? '✓ On track' : fmt(ret.gap) + '/mo'}</div></div>`;

  // Dream chip selector
  const dreamChips = el('ret-dream-chips');
  if (dreamChips) {
    dreamChips.innerHTML = DREAM_TYPES.map(d =>
      `<button class="dream-chip${(state.selectedDreams || []).includes(d.id) ? ' active' : ''}" onclick="toggleDream('${d.id}')">${d.icon} ${d.name}</button>`
    ).join('');
  }

  // Expense model rows
  const expModels = el('ret-exp-models');
  if (expModels) {
    expModels.innerHTML = Object.entries(RET_EXP_MODELS).map(([k, v]) => {
      const total = Object.values(v).reduce((s, n) => s + n, 0);
      return `<div class="exp-model-row"><div class="em-tier">${k.charAt(0).toUpperCase() + k.slice(1)}</div>` +
        Object.entries(v).map(([cat, amt]) => `<div class="em-cell"><div class="em-cat">${cat}</div><div class="em-amt">${fmt(amt)}</div></div>`).join('') +
        `<div class="em-total">${fmt(total)}/mo</div></div>`;
    }).join('');
  }

  // Destination cards
  const destCards = el('ret-dest-cards');
  if (destCards) {
    destCards.innerHTML = RET_DESTS.map(d =>
      `<div class="dest-card${state.selectedRetDest === d.name ? ' active' : ''}" onclick="state.selectedRetDest='${d.name}';saveState();renderRetire()">` +
        `<div class="dc-flag">${d.flag}</div><div class="dc-name">${d.name}</div><div class="dc-country">${d.country}</div>` +
        `<div class="dc-cost">${fmt(d.costK * 1000)}/mo</div>` +
        `<div class="dc-tags">${d.tl.map(t => '<span class="dc-tag">' + t + '</span>').join('')}</div>` +
      `</div>`
    ).join('');
  }

  // Leaflet world map
  const retMapEl = el('ret-map');
  if (retMapEl && typeof L !== 'undefined') {
    if (!retMap) {
      retMap = L.map(retMapEl).setView([25, 10], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }).addTo(retMap);
    }
    retMap.eachLayer(l => { if (l instanceof L.Marker) retMap.removeLayer(l); });
    RET_DESTS.forEach(d => {
      const marker = L.marker([d.lat, d.lng]).addTo(retMap)
        .bindPopup(`<b>${d.flag} ${d.name}</b><br>${d.country}<br>${fmt(d.costK * 1000)}/mo`);
      if (state.selectedRetDest === d.name) marker.openPopup();
    });
    setTimeout(() => retMap.invalidateSize(), 200);
  }

  // APEX terminal output area
  const apex = el('ret-apex-terminal');
  if (apex && !apex.dataset.init) {
    apex.dataset.init = '1';
    apex.innerHTML = '<div class="apex-line">APEX RETIREMENT PLANNER v2.0</div><div class="apex-line">Ready. Type a retirement scenario or question.</div>';
  }
}

function toggleDream(id) {
  const arr = state.selectedDreams || [];
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(id);
  state.selectedDreams = arr;
  saveState();
  renderRetire();
}

// ─────────────────────────────────────────────────────────────────
// renderSettings
// ─────────────────────────────────────────────────────────────────
function renderSettings() {
  // Profile fields
  const fields = [
    { id: 'set-currency', key: 'currency', type: 'select', options: Object.keys(CSYM) },
    { id: 'set-age', key: 'currentAge', type: 'number' },
    { id: 'set-ret-age', key: 'retirementAge', type: 'number' },
    { id: 'set-life-exp', key: 'lifeExp', type: 'number' },
    { id: 'set-growth', key: 'growthRate', type: 'number', step: 0.1 },
    { id: 'set-inflation', key: 'inflationRate', type: 'number', step: 0.1 },
    { id: 'set-post-ret-growth', key: 'postRetGrowth', type: 'number', step: 0.1 },
    { id: 'set-withdraw-tax', key: 'withdrawTaxRate', type: 'number', step: 1 },
    { id: 'set-ticker', key: 'tickerQuote', type: 'text' }
  ];
  fields.forEach(f => {
    const input = el(f.id);
    if (!input) return;
    if (f.type === 'select') {
      input.innerHTML = f.options.map(o => `<option value="${o}"${state[f.key] === o ? ' selected' : ''}>${o} (${CSYM[o]})</option>`).join('');
      input.onchange = () => { state[f.key] = input.value; saveState(); renderAll(); };
    } else {
      input.value = state[f.key];
      input.onchange = () => { state[f.key] = f.type === 'number' ? +input.value : input.value; saveState(); renderAll(); };
    }
  });

  // Dark mode toggle
  const darkToggle = el('set-dark-mode');
  if (darkToggle) {
    darkToggle.checked = state.darkMode;
    darkToggle.onchange = () => { state.darkMode = darkToggle.checked; saveState(); document.body.classList.toggle('light', !state.darkMode); };
  }

  // Nest egg real toggle
  const realToggle = el('set-nest-real');
  if (realToggle) {
    realToggle.checked = state.nestEggReal;
    realToggle.onchange = () => { state.nestEggReal = realToggle.checked; saveState(); renderAll(); };
  }

  // Exchange rate inputs
  const exDiv = el('set-exchange-rates');
  if (exDiv) {
    exDiv.innerHTML = Object.entries(state.exchangeRates).map(([cur, rate]) =>
      `<div class="ex-field"><label>${cur}</label><input type="number" step="0.01" value="${rate}" onchange="state.exchangeRates['${cur}']=+this.value;saveState()"></div>`
    ).join('');
  }

  // Firebase status
  const fbStatus = el('fbStatus');
  if (fbStatus && fbReady) {
    fbStatus.innerHTML = '<span style="color:var(--green)">✓ Connected</span>';
  }

  // Perplexity key field
  const pxKey = el('set-perplexity-key');
  if (pxKey) {
    pxKey.value = localStorage.getItem('propiq_pk') || '';
    pxKey.onchange = () => { localStorage.setItem('propiq_pk', pxKey.value); };
  }

  // Export/import buttons
  const exportBtn = el('set-export');
  if (exportBtn) exportBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(state, null, 2));
    a.download = 'horizon-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
  };

  const importInput = el('set-import');
  if (importInput) importInput.onchange = () => {
    const f = importInput.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        Object.assign(state, JSON.parse(e.target.result));
        saveState();
        renderAll();
      } catch (ex) { alert('Invalid file: ' + ex.message); }
    };
    r.readAsText(f);
  };

  // Reset button
  const resetBtn = el('set-reset');
  if (resetBtn) resetBtn.onclick = () => {
    if (confirm('Reset all data? This cannot be undone.')) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  };
}

// ─────────────────────────────────────────────────────────────────
// Master render functions
// ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderCashFlow();
  renderNetWorth();
  renderAssets();
  renderFunFund();
  renderRetire();
  renderSettings();
}

function renderActivePanel() {
  const renderers = {
    dashboard: renderDashboard,
    cashflow: renderCashFlow,
    networth: renderNetWorth,
    assets: renderAssets,
    vacation: renderFunFund,
    retirement: renderRetire,
    settings: renderSettings
  };
  const fn = renderers[currentPanel];
  if (fn) fn();
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// MONEY OS — PANEL RENDERERS (Part 3)
// ═══════════════════════════════════════════════════════════════════

let charts = {};
let dashCfView = 'month'; // 'month' | '12mo'

function fmtCur(n, cur) {
  const c = cur || state.currency || 'SEK';
  const sym = CSYM[c] || '';
  const rate = state.exchangeRates[c] || 1;
  const v = Math.round(n * rate);
  return sym + ' ' + v.toLocaleString('en-US');
}

function setEl(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

// ───────────────────────────────────────────────────────────────────
// DASHBOARD
// ───────────────────────────────────────────────────────────────────
function renderDashboard() {
  const inc = calcIncome();
  const exp = calcExpenses();
  const sav = calcSavings();
  const nw = calcNetWorth();
  const egg = calcNestEgg();
  const cf = calcCashFlow();

  // KPI grid
  setEl('kpi-income', fmtCur(inc.total));
  setEl('kpi-expenses', fmtCur(exp.total));
  setEl('kpi-surplus', fmtCur(sav.surplus));
  setEl('kpi-savings-rate', sav.savingsRate.toFixed(1) + '%');
  setEl('kpi-networth', fmtCur(nw.netWorth));
  setEl('kpi-nestegg', fmtCur(egg.finalNominal));
  setEl('kpi-funfund', fmtCur(sav.funFund));
  setEl('kpi-paid', exp.paid.length + '/' + exp.items.length);

  // Ticker quote
  setEl('dash-ticker', state.tickerQuote || '');

  // Cash flow summary toggle (month vs 12-mo)
  const cfSummary = document.getElementById('dash-cf-summary');
  if (cfSummary) {
    if (dashCfView === 'month') {
      cfSummary.innerHTML = `
        <div class="cf-row"><span>Income</span><b>${fmtCur(inc.total)}</b></div>
        <div class="cf-row"><span>Expenses</span><b>${fmtCur(exp.total)}</b></div>
        <div class="cf-row"><span>Surplus</span><b>${fmtCur(sav.surplus)}</b></div>
        <div class="cf-row"><span>Fun Fund</span><b>${fmtCur(sav.funFund)}</b></div>
      `;
    } else {
      cfSummary.innerHTML = `
        <div class="cf-row"><span>Avg Income</span><b>${fmtCur(cf.avgIncome)}</b></div>
        <div class="cf-row"><span>Avg Expenses</span><b>${fmtCur(cf.avgExpenses)}</b></div>
        <div class="cf-row"><span>Avg Surplus</span><b>${fmtCur(cf.avgSurplus)}</b></div>
        <div class="cf-row"><span>12-mo Saved</span><b>${fmtCur(cf.cumSavings)}</b></div>
      `;
    }
  }

  // Toggle buttons active state
  document.querySelectorAll('.dash-cf-toggle').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === dashCfView);
  });

  // Savings chart (Chart.js)
  const chartEl = document.getElementById('dash-savings-chart');
  if (chartEl && typeof Chart !== 'undefined') {
    if (charts.dashSavings) charts.dashSavings.destroy();
    charts.dashSavings = new Chart(chartEl, {
      type: 'line',
      data: {
        labels: cf.months.map(m => m.label),
        datasets: [{
          label: 'Cumulative Savings',
          data: cf.months.map(m => m.cumSavings),
          borderColor: '#00e8a0',
          backgroundColor: 'rgba(0,232,160,0.1)',
          tension: 0.3,
          fill: true
        }, {
          label: 'Monthly Surplus',
          data: cf.months.map(m => m.surplus),
          borderColor: '#4d8fff',
          backgroundColor: 'transparent',
          tension: 0.3,
          borderDash: [4, 4]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#888', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } },
          y: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } }
        }
      }
    });
  }

  // Nest egg milestone progress bars
  const milestones = [1000000, 2500000, 5000000, 10000000, 25000000];
  const currentEgg = egg.finalNominal;
  const milestonesEl = document.getElementById('dash-milestones');
  if (milestonesEl) {
    milestonesEl.innerHTML = milestones.map(m => {
      const pct = Math.min(100, (currentEgg / m) * 100);
      const reached = currentEgg >= m;
      return `
        <div class="milestone ${reached ? 'reached' : ''}">
          <div class="milestone-label">
            <span>${fmtCur(m)}</span>
            <span>${pct.toFixed(0)}%</span>
          </div>
          <div class="milestone-bar">
            <div class="milestone-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');
  }
}

function setDashCfView(view) {
  dashCfView = view;
  renderDashboard();
}

// ───────────────────────────────────────────────────────────────────
// CASH FLOW
// ───────────────────────────────────────────────────────────────────
function renderCashFlow() {
  const inc = calcIncome();
  const exp = calcExpenses();
  const sav = calcSavings();
  const cf = calcCashFlow();

  // Month strip — 12 months centered on current selection
  const stripEl = document.getElementById('cf-month-strip');
  if (stripEl) {
    const [selY, selM] = state.selectedMonth.split('-').map(Number);
    const strip = [];
    for (let i = -6; i <= 5; i++) {
      const d = new Date(selY, selM - 1 + i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const active = key === state.selectedMonth;
      strip.push(`
        <div class="cf-month ${active ? 'active' : ''}" onclick="selectMonth('${key}')">
          <div class="cf-month-mn">${MN[d.getMonth()]}</div>
          <div class="cf-month-yr">${d.getFullYear()}</div>
        </div>
      `);
    }
    stripEl.innerHTML = strip.join('');
  }

  // Income line items with paid checkboxes + remove buttons
  const incEl = document.getElementById('cf-income-list');
  if (incEl) {
    incEl.innerHTML = inc.items.map(i => `
      <div class="line-item">
        <input type="checkbox" ${i.paid ? 'checked' : ''} onchange="togglePaid('income','${i.id}')">
        <input type="text" value="${i.name}" onchange="updateLineItem('income','${i.id}','name',this.value)">
        <input type="number" value="${i.amount}" onchange="updateLineItem('income','${i.id}','amount',Number(this.value))">
        <button class="btn-remove" onclick="removeLineItem('income','${i.id}')">\u2715</button>
      </div>
    `).join('') + `
      <button class="btn-add" onclick="addLineItem('income')">+ Add income</button>
    `;
  }

  // Expense line items
  const expEl = document.getElementById('cf-expense-list');
  if (expEl) {
    expEl.innerHTML = exp.items.map(i => `
      <div class="line-item ${i.paid ? 'is-paid' : ''}">
        <input type="checkbox" ${i.paid ? 'checked' : ''} onchange="togglePaid('expenses','${i.id}')">
        <input type="text" value="${i.name}" onchange="updateLineItem('expenses','${i.id}','name',this.value)">
        <input type="number" value="${i.amount}" onchange="updateLineItem('expenses','${i.id}','amount',Number(this.value))">
        <button class="btn-remove" onclick="removeLineItem('expenses','${i.id}')">\u2715</button>
      </div>
    `).join('') + `
      <button class="btn-add" onclick="addLineItem('expenses')">+ Add expense</button>
    `;
  }

  // Totals
  setEl('cf-income-total', fmtCur(inc.total));
  setEl('cf-expense-total', fmtCur(exp.total));
  setEl('cf-surplus-total', fmtCur(sav.surplus));
  setEl('cf-paid-total', fmtCur(exp.paidTotal));
  setEl('cf-unpaid-total', fmtCur(exp.unpaidTotal));

  // Savings allocation sliders
  const allocEl = document.getElementById('cf-allocation');
  if (allocEl) {
    const total = sav.baseSavings;
    const emPct = total > 0 ? (sav.allocation.emergency / total * 100) : 50;
    const nePct = total > 0 ? (sav.allocation.nestEgg / total * 100) : 30;
    const ffPct = total > 0 ? (sav.allocation.funFund / total * 100) : 20;
    allocEl.innerHTML = `
      <div class="alloc-row">
        <label>Base savings</label>
        <input type="number" value="${sav.baseSavings}" onchange="updateBaseSavings(Number(this.value))">
        <span>${fmtCur(sav.baseSavings)}</span>
      </div>
      <div class="alloc-slider">
        <label>Emergency (${emPct.toFixed(0)}%)</label>
        <div class="slider-track"><div class="slider-fill" style="width:${emPct}%;background:#f5a623"></div></div>
        <span>${fmtCur(sav.allocation.emergency)}</span>
      </div>
      <div class="alloc-slider">
        <label>Nest Egg (${nePct.toFixed(0)}%)</label>
        <div class="slider-track"><div class="slider-fill" style="width:${nePct}%;background:#00e8a0"></div></div>
        <span>${fmtCur(sav.allocation.nestEgg)}</span>
      </div>
      <div class="alloc-slider">
        <label>Fun Fund (${ffPct.toFixed(0)}%)</label>
        <div class="slider-track"><div class="slider-fill" style="width:${ffPct}%;background:#4d8fff"></div></div>
        <span>${fmtCur(sav.allocation.funFund)}</span>
      </div>
    `;
  }

  // 12-month breakdown table
  const tblEl = document.getElementById('cf-12mo-table');
  if (tblEl) {
    tblEl.innerHTML = `
      <table class="dt">
        <thead>
          <tr>
            <th>Month</th>
            <th>Income</th>
            <th>Expenses</th>
            <th>Surplus</th>
            <th>Cumulative</th>
          </tr>
        </thead>
        <tbody>
          ${cf.months.map(m => `
            <tr>
              <td>${m.label}</td>
              <td>${fmtCur(m.income)}</td>
              <td>${fmtCur(m.expenses)}</td>
              <td class="${m.surplus >= 0 ? 'pos' : 'neg'}">${fmtCur(m.surplus)}</td>
              <td>${fmtCur(m.cumSavings)}</td>
            </tr>
          `).join('')}
          <tr class="tr-total">
            <td><b>Avg</b></td>
            <td><b>${fmtCur(cf.avgIncome)}</b></td>
            <td><b>${fmtCur(cf.avgExpenses)}</b></td>
            <td><b>${fmtCur(cf.avgSurplus)}</b></td>
            <td><b>${fmtCur(cf.cumSavings)}</b></td>
          </tr>
        </tbody>
      </table>
    `;
  }
}

function selectMonth(key) {
  state.selectedMonth = key;
  saveState();
  renderCashFlow();
}

function togglePaid(kind, id) {
  const list = state[kind];
  const item = list.find(x => x.id === id);
  if (item) { item.paid = !item.paid; saveState(); renderCashFlow(); }
}

function updateLineItem(kind, id, field, value) {
  const list = state[kind];
  const item = list.find(x => x.id === id);
  if (item) { item[field] = value; saveState(); renderCashFlow(); }
}

function addLineItem(kind) {
  const list = state[kind];
  const prefix = kind === 'income' ? 'i' : 'e';
  const id = prefix + (Date.now());
  list.push({ id, name: 'New ' + kind, amount: 0, paid: false });
  saveState();
  renderCashFlow();
}

function removeLineItem(kind, id) {
  state[kind] = state[kind].filter(x => x.id !== id);
  saveState();
  renderCashFlow();
}

function updateBaseSavings(val) {
  state.baseSavings = val;
  saveState();
  renderCashFlow();
}

// ───────────────────────────────────────────────────────────────────
// NET WORTH
// ───────────────────────────────────────────────────────────────────
function renderNetWorth() {
  const nw = calcNetWorth();
  const egg = calcNestEgg();

  // KPI row
  setEl('nw-total-assets', fmtCur(nw.assets.total));
  setEl('nw-total-liabilities', fmtCur(nw.liabilities.total));
  setEl('nw-net-worth', fmtCur(nw.netWorth));

  // Assets card list (investments + property)
  const assetsEl = document.getElementById('nw-assets-list');
  if (assetsEl) {
    const invCards = nw.assets.investments.items.map(a => `
      <div class="nw-card asset">
        <div class="nw-card-icon">\ud83d\udcc8</div>
        <div class="nw-card-body">
          <div class="nw-card-name">${a.name}</div>
          <div class="nw-card-sub">Investment</div>
        </div>
        <div class="nw-card-val">${fmtCur(a.value)}</div>
      </div>
    `).join('');
    const propCard = `
      <div class="nw-card asset">
        <div class="nw-card-icon">\ud83c\udfe0</div>
        <div class="nw-card-body">
          <div class="nw-card-name">Property</div>
          <div class="nw-card-sub">
            <input type="number" value="${state.netWorth.property || 0}"
              onchange="updateNwField('property', Number(this.value))"
              style="width:120px">
          </div>
        </div>
        <div class="nw-card-val">${fmtCur(nw.assets.property)}</div>
      </div>
    `;
    assetsEl.innerHTML = invCards + propCard;
  }

  // Liabilities card list
  const liabEl = document.getElementById('nw-liabilities-list');
  if (liabEl) {
    liabEl.innerHTML = `
      <div class="nw-card liability">
        <div class="nw-card-icon">\ud83c\udfe6</div>
        <div class="nw-card-body">
          <div class="nw-card-name">Mortgage</div>
          <div class="nw-card-sub">
            <input type="number" value="${state.netWorth.mortgage || 0}"
              onchange="updateNwField('mortgage', Number(this.value))"
              style="width:120px">
          </div>
        </div>
        <div class="nw-card-val">${fmtCur(nw.liabilities.mortgage)}</div>
      </div>
      <div class="nw-card liability">
        <div class="nw-card-icon">\ud83d\udcb3</div>
        <div class="nw-card-body">
          <div class="nw-card-name">Other Debt</div>
          <div class="nw-card-sub">
            <input type="number" value="${state.netWorth.otherDebt || 0}"
              onchange="updateNwField('otherDebt', Number(this.value))"
              style="width:120px">
          </div>
        </div>
        <div class="nw-card-val">${fmtCur(nw.liabilities.otherDebt)}</div>
      </div>
    `;
  }

  // Chart.js projection chart — net worth trajectory over years
  const chartEl = document.getElementById('nw-projection-chart');
  if (chartEl && typeof Chart !== 'undefined') {
    if (charts.nwProjection) charts.nwProjection.destroy();
    const labels = egg.grandTotal.map(p => 'Y' + p.year);
    const netWorthSeries = egg.grandTotal.map(p => p.nominal + nw.assets.property - nw.liabilities.total);
    charts.nwProjection = new Chart(chartEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Projected Net Worth',
          data: netWorthSeries,
          borderColor: '#00e8a0',
          backgroundColor: 'rgba(0,232,160,0.12)',
          tension: 0.3,
          fill: true
        }, {
          label: 'Investments only',
          data: egg.grandTotal.map(p => p.nominal),
          borderColor: '#4d8fff',
          backgroundColor: 'transparent',
          borderDash: [4, 4],
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#888', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } },
          y: { ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } }
        }
      }
    });
  }
}

function updateNwField(field, val) {
  state.netWorth[field] = val;
  saveState();
  renderNetWorth();
}

// ───────────────────────────────────────────────────────────────────
// ASSETS & NEST EGG
// ───────────────────────────────────────────────────────────────────
let assetsRealView = false;

function renderAssets() {
  const egg = calcNestEgg();

  // KPI summary
  setEl('assets-total', fmtCur(egg.finalNominal));
  setEl('assets-total-real', fmtCur(egg.finalReal));
  setEl('assets-years', String(egg.years));

  // Portfolio vehicle rows
  const listEl = document.getElementById('assets-list');
  if (listEl) {
    listEl.innerHTML = (state.externalAssets || []).map(a => `
      <div class="asset-row">
        <input type="text" value="${a.name}"
          onchange="updateAsset('${a.id}','name',this.value)"
          class="asset-name">
        <div class="asset-field">
          <label>Balance</label>
          <input type="number" value="${a.balance}"
            onchange="updateAsset('${a.id}','balance',Number(this.value))">
        </div>
        <div class="asset-field">
          <label>Growth %</label>
          <input type="number" step="0.1" value="${a.growthRate}"
            onchange="updateAsset('${a.id}','growthRate',Number(this.value))">
        </div>
        <div class="asset-field">
          <label>Monthly</label>
          <input type="number" value="${a.monthlyContribution}"
            onchange="updateAsset('${a.id}','monthlyContribution',Number(this.value))">
        </div>
        <button class="btn-remove" onclick="removeAsset('${a.id}')">\u2715</button>
      </div>
    `).join('') + `
      <button class="btn-add" onclick="addAsset()">+ Add vehicle</button>
    `;
  }

  // Real/nominal toggle state
  document.querySelectorAll('.assets-toggle').forEach(btn => {
    btn.classList.toggle('active',
      (btn.dataset.view === 'real') === assetsRealView);
  });

  // Chart.js nest egg growth chart — stacked per-asset
  const chartEl = document.getElementById('assets-growth-chart');
  if (chartEl && typeof Chart !== 'undefined') {
    if (charts.assetsGrowth) charts.assetsGrowth.destroy();
    const labels = [];
    for (let y = 0; y <= egg.years; y++) labels.push('Y' + y);

    const palette = ['#00e8a0', '#4d8fff', '#f5a623', '#8b5cf6', '#ec4899', '#00d4ff'];
    const datasets = egg.assetProjections.map((ap, i) => ({
      label: ap.name,
      data: ap.timeline.map(t => assetsRealView ? t.real : t.nominal),
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '33',
      tension: 0.3,
      fill: true
    }));
    // Add savings contribution line
    datasets.push({
      label: 'Monthly Savings',
      data: egg.savingsTimeline.map(t => assetsRealView ? t.real : t.nominal),
      borderColor: '#ffffff',
      backgroundColor: 'rgba(255,255,255,0.08)',
      tension: 0.3,
      fill: true
    });

    charts.assetsGrowth = new Chart(chartEl, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#888', font: { size: 10 } } },
          title: {
            display: true,
            text: assetsRealView ? 'Real value (today\u2019s SEK)' : 'Nominal value',
            color: '#888',
            font: { size: 10 }
          }
        },
        scales: {
          x: { stacked: true, ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } },
          y: { stacked: true, ticks: { color: '#666', font: { size: 9 } }, grid: { color: '#ffffff08' } }
        }
      }
    });
  }
}

function setAssetsView(real) {
  assetsRealView = !!real;
  renderAssets();
}

function updateAsset(id, field, val) {
  const a = (state.externalAssets || []).find(x => x.id === id);
  if (a) { a[field] = val; saveState(); renderAssets(); }
}

function addAsset() {
  if (!state.externalAssets) state.externalAssets = [];
  state.externalAssets.push({
    id: 'a' + Date.now(),
    name: 'New vehicle',
    balance: 0,
    growthRate: state.growthRate || 7,
    monthlyContribution: 0
  });
  saveState();
  renderAssets();
}

function removeAsset(id) {
  state.externalAssets = (state.externalAssets || []).filter(x => x.id !== id);
  saveState();
  renderAssets();
}

// ───────────────────────────────────────────────────────────────────
// FUN FUND / VACATION PLANNER
// ───────────────────────────────────────────────────────────────────
let vacMap = null;
let vacFilter = 'all';

function renderFunFund() {
  const ff = calcFunFund();

  // Headline
  setEl('ff-balance', fmtCur(ff.balance));
  setEl('ff-monthly', fmtCur(ff.monthlySurplus));

  // Tier grid with affordability highlights
  const tierEl = document.getElementById('ff-tier-grid');
  if (tierEl) {
    tierEl.innerHTML = ff.tiers.map(t => {
      const pct = t.affordable ? 100 : Math.min(100, (ff.balance / t.amount) * 100);
      const reachTxt = t.affordable
        ? 'Affordable now'
        : (t.monthsToReach === Infinity ? 'Out of reach' : t.monthsToReach + ' months');
      return `
        <div class="ff-tier ${t.affordable ? 'ok' : ''}">
          <div class="ff-tier-name">${t.name}</div>
          <div class="ff-tier-amt">${fmtCur(t.amount)}</div>
          <div class="ff-tier-bar"><div class="ff-tier-fill" style="width:${pct}%"></div></div>
          <div class="ff-tier-reach">${reachTxt}</div>
        </div>
      `;
    }).join('');
  }

  // Next-tier focus card
  const nextEl = document.getElementById('ff-next-tier');
  if (nextEl) {
    if (ff.nextTier) {
      const need = ff.nextTier.amount - ff.balance;
      nextEl.innerHTML = `
        <div class="ff-next-name">Next: ${ff.nextTier.name}</div>
        <div class="ff-next-need">${fmtCur(Math.max(0, need))} to go</div>
        <div class="ff-next-months">${ff.nextTier.monthsToReach === Infinity ? '\u2014' : ff.nextTier.monthsToReach + ' months'}</div>
      `;
    } else {
      nextEl.innerHTML = `<div class="ff-next-name">All tiers unlocked \ud83c\udf89</div>`;
    }
  }

  // Fund timeline bars — projected fun fund accrual over 12 months
  const tlEl = document.getElementById('ff-timeline');
  if (tlEl) {
    const bars = [];
    const now = new Date();
    let running = ff.balance;
    const maxBar = ff.balance + ff.monthlySurplus * 12;
    for (let i = 0; i < 12; i++) {
      running += ff.monthlySurplus;
      const d = new Date(now.getFullYear(), now.getMonth() + i + 1, 1);
      const pct = maxBar > 0 ? (running / maxBar) * 100 : 0;
      bars.push(`
        <div class="ff-tl-bar">
          <div class="ff-tl-fill" style="height:${pct}%"></div>
          <div class="ff-tl-lbl">${MN[d.getMonth()]}</div>
          <div class="ff-tl-val">${fmtCur(running)}</div>
        </div>
      `);
    }
    tlEl.innerHTML = bars.join('');
  }

  // Saved trips list
  const tripsEl = document.getElementById('ff-saved-trips');
  if (tripsEl) {
    const trips = state.savedTrips || [];
    if (trips.length === 0) {
      tripsEl.innerHTML = '<div class="empty">No saved trips yet. Pick a destination below.</div>';
    } else {
      tripsEl.innerHTML = trips.map((t, i) => `
        <div class="trip-card">
          <div class="trip-flag">${t.flag || '\u2708'}</div>
          <div class="trip-body">
            <div class="trip-name">${t.dest}</div>
            <div class="trip-cost">${t.cost}</div>
          </div>
          <button class="btn-remove" onclick="removeTrip(${i})">\u2715</button>
        </div>
      `).join('');
    }
  }

  // Destination pulse grid with filters
  const pulseEl = document.getElementById('ff-pulse-grid');
  if (pulseEl) {
    const filtered = vacFilter === 'all'
      ? PULSE_DESTS
      : PULSE_DESTS.filter(d => d.vibe === vacFilter);
    pulseEl.innerHTML = filtered.map((d, idx) => `
      <div class="pulse-card" style="border-left:3px solid ${d.col}" onclick="saveTrip(${PULSE_DESTS.indexOf(d)})">
        <div class="pulse-flag">${d.flag}</div>
        <div class="pulse-name">${d.dest}</div>
        <div class="pulse-vibe">${d.vibe}</div>
        <div class="pulse-why">${d.why}</div>
        <div class="pulse-cost">${d.cost}</div>
      </div>
    `).join('');
  }

  // Filter chips active state
  document.querySelectorAll('.ff-filter').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === vacFilter);
  });

  // Leaflet map markers
  if (typeof L !== 'undefined') {
    const mapEl = document.getElementById('ff-map');
    if (mapEl) {
      if (!vacMap) {
        vacMap = L.map('ff-map', { zoomControl: false }).setView([20, 15], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
          attribution: '\u00a9 CARTO', maxZoom: 18
        }).addTo(vacMap);
      } else {
        vacMap.eachLayer(l => { if (l instanceof L.CircleMarker) vacMap.removeLayer(l); });
      }
      PULSE_DESTS.forEach((d, idx) => {
        L.circleMarker([d.lat, d.lng], {
          radius: 8, color: d.col, fillColor: d.col, fillOpacity: 0.6, weight: 2
        }).bindPopup(`<b>${d.flag} ${d.dest}</b><br>${d.cost}<br><em>${d.why}</em>`)
          .on('click', () => saveTrip(idx))
          .addTo(vacMap);
      });
      setTimeout(() => vacMap.invalidateSize(), 100);
    }
  }
}

function setVacFilter(vibe) {
  vacFilter = vibe;
  renderFunFund();
}

function saveTrip(idx) {
  const dest = PULSE_DESTS[idx];
  if (!dest) return;
  if (!state.savedTrips) state.savedTrips = [];
  state.savedTrips.push({ ...dest });
  saveState();
  renderFunFund();
}

function removeTrip(idx) {
  (state.savedTrips || []).splice(idx, 1);
  saveState();
  renderFunFund();
}

// ───────────────────────────────────────────────────────────────────
// RETIRE ANYWHERE
// ───────────────────────────────────────────────────────────────────
let retMap = null;
let retExpModel = 'mid';

function renderRetire() {
  const ret = calcRetirement();
  const egg = calcNestEgg();

  // Scenario cards
  setEl('ret-years-to', String(ret.yearsToRetirement));
  setEl('ret-years-in', String(ret.retirementYears));
  setEl('ret-nest-egg', fmtCur(ret.nestEggAtRetirement));
  setEl('ret-monthly-income', fmtCur(ret.monthlyRetirementIncome));
  setEl('ret-monthly-target', fmtCur(ret.monthlyTarget));
  setEl('ret-fire', fmtCur(ret.fireNumber));
  setEl('ret-gap', fmtCur(Math.abs(ret.gap)));
  const gapEl = document.getElementById('ret-gap-status');
  if (gapEl) {
    gapEl.textContent = ret.onTrack ? 'ON TRACK' : 'GAP';
    gapEl.className = 'gap-badge ' + (ret.onTrack ? 'ok' : 'bad');
  }

  // Swedish pension input fields
  setVal('ret-pen-allman', state.penAllman || 0);
  setVal('ret-pen-itp', state.penITP || 0);
  setVal('ret-pen-other', state.penOther || 0);
  setEl('ret-pen-total', fmtCur(ret.pension.monthlyTotal));

  // Profile inputs
  setVal('ret-current-age', state.currentAge);
  setVal('ret-retire-age', state.retirementAge);
  setVal('ret-life-exp', state.lifeExp);
  setVal('ret-post-growth', state.postRetGrowth);
  setVal('ret-tax-rate', state.withdrawTaxRate);

  // Dream chip selector
  const chipsEl = document.getElementById('ret-dream-chips');
  if (chipsEl) {
    const sel = state.selectedDreams || [];
    chipsEl.innerHTML = DREAM_TYPES.map(d => `
      <div class="dream-chip ${sel.includes(d.id) ? 'on' : ''}"
        onclick="toggleDream('${d.id}')">
        <span class="dream-icon">${d.icon}</span>
        <span>${d.name}</span>
      </div>
    `).join('');
  }

  // Expense model rows
  const model = RET_EXP_MODELS[retExpModel];
  const modelEl = document.getElementById('ret-exp-model');
  if (modelEl) {
    const rows = Object.entries(model).map(([k, v]) => `
      <div class="exp-row">
        <div class="exp-k">${k.charAt(0).toUpperCase() + k.slice(1)}</div>
        <div class="exp-v">${fmtCur(v)}</div>
      </div>
    `).join('');
    const total = Object.values(model).reduce((s, v) => s + v, 0);
    modelEl.innerHTML = rows + `
      <div class="exp-row total">
        <div class="exp-k">Total / month</div>
        <div class="exp-v"><b>${fmtCur(total)}</b></div>
      </div>
    `;
  }

  // Expense model tier buttons
  document.querySelectorAll('.ret-exp-tier').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.model === retExpModel);
  });

  // Destination cards
  const destEl = document.getElementById('ret-dest-cards');
  if (destEl) {
    destEl.innerHTML = RET_DESTS.map((d, idx) => {
      const selected = state.selectedRetDest === idx;
      const tags = d.tl.map(t => `<span class="dt-tag">${t}</span>`).join('');
      return `
        <div class="ret-card ${selected ? 'selected' : ''}" onclick="selectRetDest(${idx})">
          <div class="ret-card-hd">
            <span class="ret-flag">${d.flag}</span>
            <div>
              <div class="ret-name">${d.name}</div>
              <div class="ret-country">${d.country}</div>
            </div>
            <div class="ret-cost">${fmtCur(d.costK * 1000)}/mo</div>
          </div>
          <div class="ret-tags">${tags}</div>
        </div>
      `;
    }).join('');
  }

  // Leaflet world map
  if (typeof L !== 'undefined') {
    const mapEl = document.getElementById('ret-map');
    if (mapEl) {
      if (!retMap) {
        retMap = L.map('ret-map', { zoomControl: false }).setView([25, 10], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
          attribution: '\u00a9 CARTO', maxZoom: 18
        }).addTo(retMap);
      } else {
        retMap.eachLayer(l => { if (l instanceof L.CircleMarker) retMap.removeLayer(l); });
      }
      RET_DESTS.forEach((d, idx) => {
        const sel = state.selectedRetDest === idx;
        L.circleMarker([d.lat, d.lng], {
          radius: sel ? 11 : 7,
          color: sel ? '#00e8a0' : '#4d8fff',
          fillColor: sel ? '#00e8a0' : '#4d8fff',
          fillOpacity: 0.6, weight: 2
        }).bindPopup(`<b>${d.flag} ${d.name}</b><br>${d.country}<br>${fmtCur(d.costK * 1000)}/mo`)
          .on('click', () => selectRetDest(idx))
          .addTo(retMap);
      });
      setTimeout(() => retMap.invalidateSize(), 100);
    }
  }

  // APEX terminal output area — scenario summary
  const apexEl = document.getElementById('ret-apex-output');
  if (apexEl) {
    const dest = state.selectedRetDest !== null && state.selectedRetDest !== undefined
      ? RET_DESTS[state.selectedRetDest] : null;
    const lines = [
      '> APEX RETIREMENT SCENARIO ANALYSIS',
      '> ---------------------------------',
      `> CURRENT AGE ........... ${state.currentAge}`,
      `> RETIRE AGE ............ ${state.retirementAge}`,
      `> HORIZON ............... ${ret.yearsToRetirement}y accumulation / ${ret.retirementYears}y drawdown`,
      `> NEST EGG @ RETIRE ..... ${fmtCur(ret.nestEggAtRetirement)}`,
      `> PENSION / MONTH ....... ${fmtCur(ret.pension.monthlyTotal)}`,
      `> DRAWDOWN / MONTH ...... ${fmtCur(ret.monthlyDrawdownAfterTax)} (after ${state.withdrawTaxRate}% tax)`,
      `> TOTAL INCOME / MONTH .. ${fmtCur(ret.monthlyRetirementIncome)}`,
      `> CURRENT EXPENSES ...... ${fmtCur(ret.monthlyTarget)}`,
      `> GAP ................... ${ret.onTrack ? 'NONE \u2014 ON TRACK' : fmtCur(Math.abs(ret.gap)) + ' SHORTFALL'}`,
      `> FIRE NUMBER ........... ${fmtCur(ret.fireNumber)}`,
      '> ---------------------------------',
      dest ? `> TARGET DESTINATION ... ${dest.flag} ${dest.name}, ${dest.country}` : '> TARGET DESTINATION ... (none selected)',
      dest ? `> LOCAL COST ESTIMATE .. ${fmtCur(dest.costK * 1000)}/mo` : '',
      '> END REPORT'
    ].filter(Boolean);
    apexEl.textContent = lines.join('\n');
  }
}

function toggleDream(id) {
  if (!state.selectedDreams) state.selectedDreams = [];
  const i = state.selectedDreams.indexOf(id);
  if (i >= 0) state.selectedDreams.splice(i, 1);
  else state.selectedDreams.push(id);
  saveState();
  renderRetire();
}

function setExpModel(model) {
  retExpModel = model;
  renderRetire();
}

function selectRetDest(idx) {
  state.selectedRetDest = idx;
  saveState();
  renderRetire();
}

function updateRetField(field, val) {
  state[field] = val;
  saveState();
  renderRetire();
}

// ───────────────────────────────────────────────────────────────────
// SETTINGS
// ───────────────────────────────────────────────────────────────────
function renderSettings() {
  // Profile fields
  setVal('set-current-age', state.currentAge);
  setVal('set-retire-age', state.retirementAge);
  setVal('set-life-exp', state.lifeExp);
  setVal('set-growth-rate', state.growthRate);
  setVal('set-inflation', state.inflationRate);
  setVal('set-post-growth', state.postRetGrowth);
  setVal('set-tax-rate', state.withdrawTaxRate);
  setVal('set-ticker', state.tickerQuote || '');

  // Display toggles — currency selector + dark mode
  const curSel = document.getElementById('set-currency');
  if (curSel) {
    curSel.innerHTML = Object.keys(CSYM).map(c =>
      `<option value="${c}" ${c === state.currency ? 'selected' : ''}>${c} (${CSYM[c]})</option>`
    ).join('');
  }

  const darkEl = document.getElementById('set-dark-mode');
  if (darkEl) darkEl.checked = !!state.darkMode;

  const realEl = document.getElementById('set-nestegg-real');
  if (realEl) realEl.checked = !!state.nestEggReal;

  // Exchange rate inputs
  const fxEl = document.getElementById('set-exchange-rates');
  if (fxEl) {
    fxEl.innerHTML = Object.entries(state.exchangeRates).map(([cur, rate]) => `
      <div class="fx-row">
        <label>${cur} (${CSYM[cur] || ''})</label>
        <input type="number" step="0.0001" value="${rate}"
          onchange="updateExchangeRate('${cur}', Number(this.value))"
          ${cur === 'SEK' ? 'disabled' : ''}>
      </div>
    `).join('');
  }

  // Firebase status
  const fbStatus = document.getElementById('fbStatus');
  if (fbStatus && !fbStatus.innerHTML.trim()) {
    fbStatus.innerHTML = fbReady
      ? '<span style="color:var(--green)">\u2713 Connected</span>'
      : '<span style="color:var(--text2)">Not connected</span>';
  }
  const fbUrlEl = document.getElementById('fbUrl');
  const fbKeyEl = document.getElementById('fbKey');
  const fbUserEl = document.getElementById('fbUser');
  if (fbUrlEl && !fbUrlEl.value) fbUrlEl.value = localStorage.getItem('horizon-fb-url') || '';
  if (fbKeyEl && !fbKeyEl.value) fbKeyEl.value = localStorage.getItem('horizon-fb-key') || '';
  if (fbUserEl && !fbUserEl.value) fbUserEl.value = localStorage.getItem('horizon-fb-user') || 'default';

  // Perplexity key field
  const pkEl = document.getElementById('set-perplexity-key');
  if (pkEl && !pkEl.value) {
    pkEl.value = localStorage.getItem('propiq_pk') || '';
  }

  // Anthropic key field
  const akEl = document.getElementById('set-anthropic-key');
  if (akEl && !akEl.value) {
    akEl.value = localStorage.getItem('propiq_ak') || '';
  }

  // Export / import buttons — wire up onclick if present
  const expBtn = document.getElementById('set-export-btn');
  if (expBtn && !expBtn.onclick) expBtn.onclick = exportState;
  const impBtn = document.getElementById('set-import-btn');
  if (impBtn && !impBtn.onclick) impBtn.onclick = () => document.getElementById('set-import-file').click();
  const impFile = document.getElementById('set-import-file');
  if (impFile && !impFile.onchange) impFile.onchange = (e) => importState(e.target);
  const resetBtn = document.getElementById('set-reset-btn');
  if (resetBtn && !resetBtn.onclick) {
    resetBtn.onclick = () => {
      if (confirm('Reset all data? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    };
  }
}

function updateSettingField(field, val) {
  state[field] = val;
  saveState();
  renderAll();
}

function updateExchangeRate(cur, val) {
  state.exchangeRates[cur] = val;
  saveState();
  renderAll();
}

function exportState() {
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(state, null, 2));
  a.download = 'horizon-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function importState(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      Object.assign(state, JSON.parse(e.target.result));
      saveState();
      renderAll();
      alert('Import successful');
    } catch (ex) {
      alert('Invalid file: ' + ex.message);
    }
  };
  r.readAsText(f);
}

// ───────────────────────────────────────────────────────────────────
// MASTER RENDER DISPATCH
// ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderCashFlow();
  renderNetWorth();
  renderAssets();
  renderFunFund();
  renderRetire();
  renderSettings();
}

function renderActivePanel() {
  switch (currentPanel) {
    case 'dashboard':   renderDashboard(); break;
    case 'cashflow':    renderCashFlow();  break;
    case 'networth':    renderNetWorth();  break;
    case 'assets':      renderAssets();    break;
    case 'vacation':    renderFunFund();   break;
    case 'retirement':  renderRetire();    break;
    case 'settings':    renderSettings();  break;
  }
}
</script>

// Ensure state.propiq exists, migrating from legacy flat keys if needed
function ensurePropiqState() {
  if (!state.propiq || typeof state.propiq !== 'object') {
    state.propiq = {
      market:    state.ppiMarket    || 'ke',
      history:   state.ppiHistory   || [],
      lastQuery: state.ppiLastQuery || ''
    };
  }
  if (!state.propiq.market) state.propiq.market = 'ke';
  if (!state.propiq.history) state.propiq.history = [];
  if (typeof state.propiq.lastQuery !== 'string') state.propiq.lastQuery = '';
}

// ───────────────────────────────────────────────────────────────────
// setMarket — switches active market (KE/SE)
// ───────────────────────────────────────────────────────────────────
function setMarket(market) {
  if (!MARKETS[market]) return;
  ensurePropiqState();
  state.propiq.market = market;
  saveState();

  const cfg = MARKETS[market];

  // Market banner
  const banner = document.getElementById('piq-market-banner');
  if (banner) {
    banner.className = 'market-banner ' + market;
    banner.innerHTML = cfg.banner;
  }

  // Search label + placeholder
  const label = document.getElementById('piq-search-label');
  if (label) label.textContent = cfg.searchLabel;
  const input = document.getElementById('piq-search-input');
  if (input) input.placeholder = cfg.placeholder;

  // Swap quick tags
  const tagsEl = document.getElementById('piq-quick-tags');
  if (tagsEl) {
    tagsEl.innerHTML = cfg.quickTags.map(t =>
      `<span class="qtag" onclick="piqQuickSearch('${t.replace(/'/g, "\\'")}')">${t}</span>`
    ).join('');
  }

  // Sidebar toggle state — top-of-sidebar KE/SE switcher
  document.querySelectorAll('.market-toggle-btn').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.market === market);
  });
  // Legacy toggle IDs (tog-ke / tog-se) — keep compatible
  const togKe = document.getElementById('tog-ke');
  const togSe = document.getElementById('tog-se');
  if (togKe) togKe.classList.toggle('on', market === 'ke');
  if (togSe) togSe.classList.toggle('on', market === 'se');
}

function piqQuickSearch(term) {
  const input = document.getElementById('piq-search-input');
  if (input) input.value = term;
  piqSearch();
}

// ───────────────────────────────────────────────────────────────────
// piqSearch — 4-step search pipeline
// ───────────────────────────────────────────────────────────────────
let piqBusy = false;

function piqSetStep(step, status, msg) {
  // status: 'pending' | 'active' | 'done' | 'skip' | 'error'
  const el = document.getElementById('piq-step-' + step);
  if (el) {
    el.className = 'piq-step ' + status;
    const m = el.querySelector('.piq-step-msg');
    if (m && msg !== undefined) m.textContent = msg;
  }
  const bar = document.getElementById('piq-progress-bar');
  if (bar) {
    const doneCount = document.querySelectorAll('.piq-step.done, .piq-step.skip').length;
    bar.style.width = Math.round((doneCount / 4) * 100) + '%';
  }
}

function piqShowProgress(show) {
  const wrap = document.getElementById('piq-progress');
  if (wrap) wrap.style.display = show ? '' : 'none';
  if (show) {
    ['1', '2', '3', '4'].forEach(n => piqSetStep(n, 'pending', ''));
    const bar = document.getElementById('piq-progress-bar');
    if (bar) bar.style.width = '0%';
  }
}

async function piqSearch() {
  if (piqBusy) return;
  ensurePropiqState();

  const input = document.getElementById('piq-search-input');
  const query = (input && input.value || '').trim();
  if (!query) {
    alert('Enter a location or property type to search.');
    return;
  }

  const market = state.propiq.market || 'ke';
  const cfg = MARKETS[market];
  if (!cfg) { alert('Unknown market: ' + market); return; }

  const anthropicKey = localStorage.getItem('propiq_ak') || '';
  const perplexityKey = localStorage.getItem('propiq_pk') || '';
  if (!anthropicKey) {
    alert('Anthropic API key required. Add it in Settings.');
    return;
  }
  if (!anthropicKey.startsWith('sk-ant-')) {
    alert('Anthropic key should start with sk-ant-');
    return;
  }

  piqBusy = true;
  state.propiq.lastQuery = query;
  piqShowProgress(true);

  const result = {
    id: 'r' + Date.now(),
    query,
    market,
    marketName: cfg.name,
    marketFlag: cfg.flag,
    currency: cfg.currency,
    timestamp: new Date().toISOString(),
    signals: [],
    analysis: null,
    legal: null,
    verdict: null
  };

  try {
    // ── STEP 1: Perplexity signals fetch ────────────────────────
    let signalsText = '';
    if (perplexityKey) {
      piqSetStep('1', 'active', 'Fetching live market signals\u2026');
      try {
        const prompt = cfg.perplexityContext.replace('{q}', query);
        const res = await fetch('https://api.perplexity.ai/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + perplexityKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.1-sonar-small-128k-online',
            messages: [{ role: 'user', content: prompt }],
            max_tokens: 1500
          })
        });
        if (res.ok) {
          const data = await res.json();
          signalsText = data.choices && data.choices[0]
            && data.choices[0].message && data.choices[0].message.content || '';
          result.rawSignals = signalsText;
          piqSetStep('1', 'done', 'Live signals retrieved');
        } else {
          piqSetStep('1', 'error', 'Perplexity error \u2014 continuing');
        }
      } catch (e) {
        piqSetStep('1', 'error', 'Perplexity unavailable \u2014 continuing');
      }
    } else {
      piqSetStep('1', 'skip', 'No Perplexity key \u2014 skipped');
    }

    // ── STEP 2: Anthropic analysis ──────────────────────────────
    piqSetStep('2', 'active', 'Running AI investment analysis\u2026');
    const analysisPrompt = cfg.analysisContext
      .replace('{q}', query)
      .replace('{signals}', signalsText || '(no external signals \u2014 use general market knowledge)');
    const aRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        messages: [{ role: 'user', content: analysisPrompt }]
      })
    });
    if (!aRes.ok) {
      const err = await aRes.json().catch(() => ({}));
      throw new Error((err.error && err.error.message) || 'Anthropic call failed');
    }
    const aData = await aRes.json();
    const aText = aData.content && aData.content[0] && aData.content[0].text || '';
    piqSetStep('2', 'done', 'Analysis complete');

    // ── STEP 3: Parse thesis JSON + determine verdict ───────────
    piqSetStep('3', 'active', 'Parsing thesis\u2026');
    let parsed = null;
    try {
      const match = aText.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match ? match[0] : aText);
    } catch (e) {
      throw new Error('Thesis parse failed: ' + e.message);
    }
    result.analysis = parsed;
    result.signals = parsed.signals || [];

    // Verdict determination — normalize to BUY / HOLD / AVOID
    let verdict = (parsed.verdict || '').toString().toUpperCase();
    if (!['BUY', 'HOLD', 'AVOID'].includes(verdict)) {
      const yieldNum = parseFloat((parsed.rentalYield || '').toString()) || 0;
      if (yieldNum >= 5) verdict = 'BUY';
      else if (yieldNum >= 3) verdict = 'HOLD';
      else verdict = 'AVOID';
    }
    result.verdict = verdict;
    result.verdictReason = parsed.verdictReason || '';

    // Simple score: 0-100 derived from verdict + yield
    const yieldNum = parseFloat((parsed.rentalYield || '').toString()) || 0;
    const base = verdict === 'BUY' ? 75 : verdict === 'HOLD' ? 55 : 30;
    result.score = Math.min(100, Math.max(0, Math.round(base + yieldNum * 2)));
    piqSetStep('3', 'done', 'Verdict: ' + verdict);

    // ── STEP 4: Legal risk assessment ───────────────────────────
    piqSetStep('4', 'active', 'Running legal risk check\u2026');
    const legalPrompt = `You are a ${cfg.name} real estate legal analyst. For the query "${query}" in ${cfg.name}, return ONLY valid JSON assessing legal/title risks.
Consider these flag areas: ${cfg.legalFlags.map(f => f.label).join(', ')}.
Return:
{"overall":"ok|warn|danger","flags":[{"key":"...","label":"...","level":"ok|warn|danger","detail":"one sentence"}],"summary":"2 sentences"}`;
    try {
      const lRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          messages: [{ role: 'user', content: legalPrompt }]
        })
      });
      if (lRes.ok) {
        const lData = await lRes.json();
        const lText = lData.content && lData.content[0] && lData.content[0].text || '';
        const lMatch = lText.match(/\{[\s\S]*\}/);
        result.legal = JSON.parse(lMatch ? lMatch[0] : lText);
        piqSetStep('4', 'done', 'Legal check complete');
      } else {
        result.legal = { overall: 'warn', flags: [], summary: 'Legal check unavailable.' };
        piqSetStep('4', 'error', 'Legal check failed \u2014 using defaults');
      }
    } catch (e) {
      result.legal = { overall: 'warn', flags: [], summary: 'Legal check unavailable.' };
      piqSetStep('4', 'error', 'Legal check unavailable');
    }

    // ── SAVE TO HISTORY ────────────────────────────────────────
    if (!Array.isArray(state.propiq.history)) state.propiq.history = [];
    state.propiq.history.unshift(result);
    if (state.propiq.history.length > 50) {
      state.propiq.history = state.propiq.history.slice(0, 50);
    }
    saveState();

    // Render results
    if (typeof piqRenderResults === 'function') {
      piqRenderResults(result);
    }
    if (typeof piqRenderHistory === 'function') {
      piqRenderHistory();
    }

    setTimeout(() => piqShowProgress(false), 800);
  } catch (e) {
    piqSetStep('4', 'error', e.message || 'Search failed');
    alert('Search failed: ' + (e.message || e));
  } finally {
    piqBusy = false;
  }
}

function piqSwitchTab(tabId) {
  if (!piqCurrentResult) return;

  document.querySelectorAll('#piq-tabs .piq-tab').forEach(el => {

  });
  piqRenderTab(tabId);
}

function piqRenderTab(tabId) {
  const body = document.getElementById('piq-tab-body');
  if (!body || !piqCurrentResult) return;
  const r = piqCurrentResult;

  switch (tabId) {
    case 'investment':
      if (typeof piqRenderInvestment === 'function') body.innerHTML = piqRenderInvestment(r);
      else body.innerHTML = '<div class="piq-placeholder">Investment view pending</div>';
      break;
    case 'mortgage':
      if (typeof piqRenderMortgage === 'function') body.innerHTML = piqRenderMortgage(r);
      else body.innerHTML = '<div class="piq-placeholder">Mortgage view pending</div>';
      break;
    case 'pipeline':
      if (typeof piqRenderPipeline === 'function') body.innerHTML = piqRenderPipeline(r);
      else body.innerHTML = '<div class="piq-placeholder">Pipeline view pending</div>';
      break;
    case 'signals':
      if (typeof piqRenderSignals === 'function') body.innerHTML = piqRenderSignals(r);
      else body.innerHTML = '<div class="piq-placeholder">Signals view pending</div>';
      break;
    case 'legal':
      if (typeof piqRenderLegal === 'function') body.innerHTML = piqRenderLegal(r);
      else body.innerHTML = '<div class="piq-placeholder">Legal view pending</div>';
      break;
    case 'currency':
      if (typeof piqRenderCurrency === 'function') body.innerHTML = piqRenderCurrency(r);
      else body.innerHTML = '<div class="piq-placeholder">Currency view pending</div>';

    case 'share':
      if (typeof piqRenderShare === 'function') body.innerHTML = piqRenderShare(r);
      else body.innerHTML = '<div class="piq-placeholder">Share view pending</div>';
      break;
  }
}

function piqEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function piqRenderInvestment(r) {
  const a = r.analysis || {};
  const cfg = MARKETS[r.market] || {};
  const verdictCls = r.verdict === 'BUY' ? 'buy'
    : r.verdict === 'HOLD' ? 'hold' : 'avoid';

  const summary = a.summary
    ? `<p class="piq-prose">${piqEscape(a.summary)}</p>`
    : '<p class="piq-prose piq-muted">No summary available.</p>';

  // Thesis bullets — split by sentence if it's prose, or by newline
  let thesisBullets = '';
  if (a.investmentThesis) {
    const raw = String(a.investmentThesis);
    const parts = raw.indexOf('\n') >= 0
      ? raw.split(/\n+/)
      : raw.split(/(?<=\.)\s+(?=[A-Z])/);
    thesisBullets = parts.filter(Boolean).map(p =>
      `<li>${piqEscape(p.trim())}</li>`
    ).join('');
  }

  const verdictCard = `
    <div class="piq-verdict-card ${verdictCls}">
      <div class="piq-verdict-hd">
        <div class="piq-verdict-lbl">AI Verdict</div>

      <div class="piq-verdict-score">

          <div class="piq-score-fill ${verdictCls}" style="width:${r.score || 0}%"></div>
        </div>
        <div class="piq-score-num">${r.score || 0}/100</div>
      </div>
      ${r.verdictReason ? `<div class="piq-verdict-reason">${piqEscape(r.verdictReason)}</div>` : ''}
      <div class="piq-verdict-meta">
        ${cfg.flag || ''} ${cfg.name || ''} \u00b7 ${a.priceRange || ''}
      </div>
    </div>
  `;

  return `
    <div class="piq-investment">
      <div class="piq-investment-main">
        <div class="piq-section">
          <div class="piq-section-hd">Summary</div>
          ${summary}
        </div>
        <div class="piq-section">
          <div class="piq-section-hd">Investment Thesis</div>
          ${thesisBullets
            ? `<ul class="piq-thesis">${thesisBullets}</ul>`
            : '<p class="piq-muted">No thesis available.</p>'}
        </div>
      </div>
      <aside class="piq-investment-side">
        ${verdictCard}
      </aside>
    </div>
  `;
}

// piqRenderMortgage — market-specific calculator
// ───────────────────────────────────────────────────────────────────
function piqRenderMortgage(r) {
  const cfg = MARKETS[r.market] || {};
  const a = r.analysis || {};

  // Parse a reasonable price default from the analysis
  function parseNum(s) {
    if (!s) return 0;
    const match = String(s).replace(/,/g, '').match(/[\d.]+/);
    const n = match ? parseFloat(match[0]) : 0;
    // Handle "M" shorthand (8M, 12M, etc.)
    return /m/i.test(String(s)) ? n * 1000000 : n;
  }

  const priceRange = a.priceRange || '';
  const defaultPrice = parseNum(priceRange) || (r.market === 'se' ? 5000000 : 12000000);
  const defaultRate = cfg.mortgageRates && cfg.mortgageRates[0] ? cfg.mortgageRates[0].val : 5;
  const defaultTerm = cfg.mortgageTerms && cfg.mortgageTerms[0] ? cfg.mortgageTerms[0].val : 300;
  const defaultDeposit = cfg.mortgageDeposit || 20;

  const rateOpts = (cfg.mortgageRates || []).map((o, i) =>
    `<option value="${o.val}" ${i === 0 ? 'selected' : ''}>${piqEscape(o.label)}</option>`
  ).join('');
  const termOpts = (cfg.mortgageTerms || []).map((o, i) =>
    `<option value="${o.val}" ${i === 0 ? 'selected' : ''}>${piqEscape(o.label)}</option>`
  ).join('');

  return `
    <div class="piq-mortgage">
      <div class="piq-mortgage-form">
        <div class="piq-section-hd">${cfg.flag || ''} ${cfg.name || ''} Mortgage Calculator</div>
        <div class="mort-field">
          <label>Property price (${cfg.currency || ''})</label>
          <input type="number" id="mort-price" value="${defaultPrice}" oninput="piqCalcMortgage()">
        </div>
        <div class="mort-field">
          <label>Deposit %</label>
          <input type="number" id="mort-deposit" value="${defaultDeposit}" min="0" max="100" oninput="piqCalcMortgage()">
          <div class="mort-ltv">LTV: <span id="mort-ltv">${100 - defaultDeposit}</span>%</div>
        </div>
        <div class="mort-field">
          <label>Lender / rate</label>
          <select id="mort-rate" onchange="piqCalcMortgage()">${rateOpts}</select>
        </div>
        <div class="mort-field">
          <label>Term</label>
          <select id="mort-term" onchange="piqCalcMortgage()">${termOpts}</select>
        </div>
      </div>
      <div class="piq-mortgage-output" id="mort-output">
        <div class="mort-out-lbl">Monthly payment</div>
        <div class="mort-out-val" id="mort-monthly">\u2014</div>
        <div class="mort-out-sub">
          Loan: <span id="mort-loan">\u2014</span> \u00b7
          Total: <span id="mort-total">\u2014</span> \u00b7
          Interest: <span id="mort-interest">\u2014</span>
        </div>
      </div>
    </div>
  `;
}

function piqCalcMortgage() {
  const price    = Number((document.getElementById('mort-price')   || {}).value) || 0;
  const depPct   = Number((document.getElementById('mort-deposit') || {}).value) || 0;
  const rate     = Number((document.getElementById('mort-rate')    || {}).value) || 0;
  const termMon  = Number((document.getElementById('mort-term')    || {}).value) || 0;
  if (!piqCurrentResult) return;
  const cfg = MARKETS[piqCurrentResult.market] || {};
  const cur = cfg.currencySymbol || '';

  const loan = price * (1 - depPct / 100);
  const r = rate / 100 / 12;
  let monthly = 0;
  if (termMon > 0) {
    if (r > 0) {
      monthly = loan * r / (1 - Math.pow(1 + r, -termMon));
    } else {
      monthly = loan / termMon;
    }
  }
  const total = monthly * termMon;
  const interest = total - loan;

  const fmt = n => cur + ' ' + Math.round(n).toLocaleString('en-US');
  const setTxt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setTxt('mort-monthly', fmt(monthly));
  setTxt('mort-loan',    fmt(loan));
  setTxt('mort-total',   fmt(total));
  setTxt('mort-interest', fmt(interest));
  setTxt('mort-ltv',     String(Math.max(0, 100 - depPct)));
}
